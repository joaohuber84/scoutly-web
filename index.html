<!DOCTYPE html> <html> <head> <title>Scoutly</title> <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> <style> body{ background:#0f172a; color:white; font-family:Arial; padding:40px; } h1{ color:#22c55e; } .game{ background:#1e293b; padding:20px; margin-top:20px; border-radius:10px; } .stat{ color:#94a3b8; } </style> </head> <body> <h1>Scoutly ⚽</h1> <div id="games"></div> <script> const SUPABASE_URL = "https://zngdcatlxlxamceqpxij.supabase.co" /* ========================================= COLE SUA KEY AQUI ENTRE AS ASPAS ========================================= */ const SUPABASE_KEY = "sb_publishable_gw3BGCEcwhidS2hFbiwxIA_W28KkZ2a" /* ========================================= */ const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY) async function loadGames(){ const { data, error } = await client .from("matches") .select("*") if(error){ console.log(error) return } const container = document.getElementById("games") container.innerHTML = "" data.forEach(match => { const div = document.createElement("div") div.className = "game" div.innerHTML = ` <h2>${match.home_team} vs ${match.away_team}</h2> <div class="stat">Gols esperados: ${match.avg_goals ?? "-"}</div> <div class="stat">Cantos esperados: ${match.avg_corners ?? "-"}</div> <div class="stat">Finalizações esperadas: ${match.avg_shots ?? "-"}</div> <div class="stat">Over 2.5: ${match.over25_prob ?? "-"}%</div> <div class="stat">BTTS: ${match.btts_prob ?? "-"}%</div> ` container.appendChild(div) }) } loadGames() </script> </body> </html>
