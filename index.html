<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scoutly</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

h1{
color:#22c55e;
margin-bottom:20px;
}

.match-card{
background:#111827;
padding:16px;
border-radius:12px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.teams{
font-size:16px;
font-weight:bold;
}

.meta{
font-size:13px;
opacity:0.8;
margin-top:4px;
}

button{
background:#22c55e;
border:none;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.analysis{
margin-top:25px;
background:#111827;
padding:20px;
border-radius:12px;
}

.opportunity{
font-size:18px;
margin-bottom:10px;
}

.elite{
color:#22c55e;
font-weight:bold;
}

.strong{
color:#38bdf8;
}

.good{
color:#facc15;
}

.stats{
margin-top:12px;
font-size:14px;
opacity:0.9;
}

</style>

</head>

<body>

<h1>Scoutly ⚽</h1>

<div id="games"></div>

<div id="analysis"></div>

<script>

const SUPABASE_URL="COLE_TUA_URL_AQUI"
const SUPABASE_ANON_KEY="COLE_TUA_KEY_AQUI"

const client=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY)

async function loadGames(){

const {data,error}=await client
.from("matches")
.select("*")

const container=document.getElementById("games")

container.innerHTML=""

data.forEach(game=>{

container.innerHTML+=`

<div class="match-card">

<div>

<div class="teams">
${game.home_team} vs ${game.away_team}
</div>

<div class="meta">
${game.league} • ${game.match_date}
</div>

</div>

<button onclick="showAnalysis('${game.home_team}','${game.away_team}')">

VER ANÁLISE

</button>

</div>

`

})

}

function showAnalysis(home,away){

const analysis=document.getElementById("analysis")

analysis.innerHTML=`

<div class="analysis">

<h2>${home} vs ${away}</h2>

<div class="opportunity elite">
🔥 ELITE PICK
</div>

<div>
Over 1.5 Goals
</div>

<div class="stats">

Expected Goals: 2.7  
Expected Corners: 10.2  
Expected Shots: 23  

</div>

</div>

`

}

loadGames()

</script>

</body>

</html>
