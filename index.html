<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoutly</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: white;
      padding: 24px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .logo-img {
      width: 76px;
      height: 76px;
      object-fit: contain;
      border-radius: 16px;
      background: transparent;
    }

    .logo-fallback {
      display: none;
      align-items: center;
      gap: 10px;
    }

    .logo-title {
      color: #22c55e;
      font-size: 40px;
      font-weight: 800;
      margin: 0;
      line-height: 1;
    }

    .logo-sub {
      color: #94a3b8;
      font-size: 13px;
      margin-top: 4px;
    }

    .status {
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .status.ok {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.35);
      color: #bbf7d0;
    }

    .status.err {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fecaca;
    }

    .section {
      margin-bottom: 28px;
    }

    .section-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .section-subtitle {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .card {
      background: rgba(30, 41, 59, 0.95);
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.16);
    }

    .hero {
      background: linear-gradient(135deg, rgba(34,197,94,0.16), rgba(34,197,94,0.06));
      border-left: 5px solid #22c55e;
    }

    .small-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .big-pick {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .match-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .muted {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.5;
    }

    .prob {
      margin-top: 8px;
      font-size: 15px;
      font-weight: bold;
    }

    .radar-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .radar-item {
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .radar-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .rank {
      font-size: 12px;
      color: #94a3b8;
      font-weight: bold;
      text-transform: uppercase;
    }

    .pick-line {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .strength-label {
      margin-top: 10px;
      font-size: 13px;
      color: #cbd5e1;
      font-weight: bold;
    }

    .strength-bar {
      margin-top: 6px;
      width: 100%;
      height: 10px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #334155;
    }

    .strength-fill {
      height: 100%;
      border-radius: 999px;
    }

    .games-list .game-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .league-group {
      margin-bottom: 18px;
    }

    .league-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #e2e8f0;
    }

    .btn {
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.92;
    }

    .btn-close {
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-close:hover {
      opacity: 0.92;
    }

    .analysis-box {
      margin-top: 24px;
      display: none;
    }

    .analysis-topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .stat-box {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    .stat-title {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
    }

    .why-box {
      margin-top: 16px;
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
    }

    .why-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #86efac;
    }

    .why-item {
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .pill {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .elite {
      background: rgba(34,197,94,0.15);
      color: #86efac;
      border: 1px solid rgba(34,197,94,0.35);
    }

    .strong {
      background: rgba(56,189,248,0.15);
      color: #7dd3fc;
      border: 1px solid rgba(56,189,248,0.35);
    }

    .good {
      background: rgba(234,179,8,0.15);
      color: #fde68a;
      border: 1px solid rgba(234,179,8,0.35);
    }

    @media (max-width: 900px) {
      .radar-grid,
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="header">
      <img
        src="logo-scoutly.png"
        alt="Scoutly"
        class="logo-img"
        onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex';"
      />

      <div id="logo-fallback" class="logo-fallback">
        <div>
          <div class="logo-title">Scoutly ⚽</div>
          <div class="logo-sub">Football Intelligence</div>
        </div>
      </div>

      <div id="logo-text">
        <div class="logo-title">Scoutly</div>
        <div class="logo-sub">Football Intelligence</div>
      </div>
    </div>

    <div id="status" class="status ok">Iniciando Scoutly...</div>

    <div class="section">
      <div class="section-title">🔥 Oportunidade do dia</div>
      <div id="day-opportunity"></div>
    </div>

    <div class="section">
      <div class="section-title">🎯 Radar Scoutly — melhores oportunidades do dia</div>
      <div class="section-subtitle">
        O Scoutly analisa os jogos do dia e destaca aqui os picks com maior força estatística.
      </div>
      <div id="radar-scoutly" class="radar-grid"></div>
    </div>

    <div class="section">
      <div class="section-title">📅 Análises dos jogos do dia</div>
      <div id="games" class="games-list"></div>
    </div>

    <div id="analysis" class="analysis-box"></div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const dayOpportunityEl = document.getElementById("day-opportunity");
    const radarScoutlyEl = document.getElementById("radar-scoutly");
    const gamesEl = document.getElementById("games");
    const analysisEl = document.getElementById("analysis");

    function setStatus(text, type = "ok") {
      statusEl.className = "status " + type;
      statusEl.innerText = text;
    }

    const SUPABASE_URL = "https://zngdcatlxlxamceqpxij.supabase.co";
    const SUPABASE_KEY = "sb_publishable_gw3BGCEcwhidS2hFbiwxIA_W28KkZ2a";

    function formatDate(dateValue) {
      if (!dateValue) return "Sem data";
      try {
        return new Date(dateValue).toLocaleDateString("pt-BR");
      } catch {
        return String(dateValue);
      }
    }

    function getLeagueFlag(league = "") {
      const l = String(league).toLowerCase();

      if (l.includes("brasileirão") || l.includes("brasileirao") || l.includes("brasileiro")) return "🇧🇷";
      if (l.includes("arg")) return "🇦🇷";
      if (l.includes("mex")) return "🇲🇽";
      if (l.includes("premier")) return "🏴";
      if (l.includes("la liga")) return "🇪🇸";
      if (l.includes("serie a")) return "🇮🇹";
      if (l.includes("bundes")) return "🇩🇪";
      if (l.includes("ligue")) return "🇫🇷";
      if (l.includes("libert")) return "🏆";
      if (l.includes("sul-amer")) return "🏆";
      if (l.includes("saudi")) return "🇸🇦";
      if (l.includes("mls")) return "🇺🇸";

      return "🌍";
    }

    function getConfidence(prob) {
      const p = Number(prob || 0);
      if (p >= 70) return { label: "Muito forte", className: "elite" };
      if (p >= 60) return { label: "Forte", className: "strong" };
      return { label: "Boa", className: "good" };
    }

    function getStrengthText(prob) {
      const p = Number(prob || 0);
      if (p >= 70) return "Muito forte";
      if (p >= 60) return "Forte";
      if (p >= 50) return "Boa";
      if (p >= 45) return "Moderada";
      return "Arriscada";
    }

    function getStrengthColor(prob) {
      const p = Number(prob || 0);
      if (p >= 70) return "#22c55e";
      if (p >= 60) return "#4ade80";
      if (p >= 50) return "#eab308";
      if (p >= 45) return "#f97316";
      return "#ef4444";
    }

    function strengthPercent(prob) {
      const p = Number(prob || 0);
      if (p <= 0) return 0;
      return Math.max(8, Math.min(100, p));
    }

    function getMarketEmoji(marketName) {
      const m = String(marketName).toLowerCase();
      if (m.includes("gols")) return "⚽";
      if (m.includes("ambas")) return "🤝";
      if (m.includes("escanteios")) return "🚩";
      return "📊";
    }

    function getGoalsMarkets(match) {
      return [
        { name: "Mais de 1.5 gols", prob: Number(match.over15_prob || 0) },
        { name: "Mais de 2.5 gols", prob: Number(match.over25_prob || 0) },
        { name: "Menos de 2.5 gols", prob: Number(match.under25_prob || 0) },
        { name: "Menos de 3.5 gols", prob: Number(match.under35_prob || 0) }
      ].filter(x => x.prob > 0);
    }

    function getBTTSMarkets(match) {
      const yesProb = Number(match.btts_prob || 0);
      const noProb = yesProb > 0 ? 100 - yesProb : 0;

      const list = [];
      if (yesProb > 0) list.push({ name: "Ambas marcam", prob: yesProb });
      if (noProb > 0) list.push({ name: "Ambas NÃO marcam", prob: noProb });

      return list;
    }

    function getCornersMarkets(match) {
      const over85 = Number(match.corners_over85_prob || 0);
      const under85 = over85 > 0 ? 100 - over85 : 0;

      const list = [];
      if (over85 > 0) list.push({ name: "Mais de 8.5 escanteios", prob: over85 });
      if (under85 > 0) list.push({ name: "Menos de 8.5 escanteios", prob: under85 });

      return list;
    }

    function getBestMarket(markets) {
      const list = [...markets].sort((a, b) => b.prob - a.prob);
      return list[0] || { name: "Sem mercado", prob: 0 };
    }

    function getBestOverallPick(match) {
      const allMarkets = [
        ...getGoalsMarkets(match),
        ...getBTTSMarkets(match),
        ...getCornersMarkets(match)
      ].filter(x => x.prob > 0);

      return getBestMarket(allMarkets);
    }

    function buildRadarItems(matches) {
      return matches
        .map(match => {
          const best = getBestOverallPick(match);
          return {
            id: `${match.id}-${best.name}`,
            match,
            market: best.name,
            prob: best.prob
          };
        })
        .filter(x => x.prob > 0)
        .sort((a, b) => b.prob - a.prob);
    }

    function renderDayOpportunity(item) {
      if (!item) {
        dayOpportunityEl.innerHTML = `<div class="card">Nenhuma oportunidade encontrada.</div>`;
        return;
      }

      const conf = getConfidence(item.prob);

      dayOpportunityEl.innerHTML = `
        <div class="card hero">
          <div class="small-label">Pick principal do Scoutly hoje</div>
          <div class="big-pick">${getMarketEmoji(item.market)} ${item.market}</div>
          <div class="match-name">${item.match.home_team} x ${item.match.away_team}</div>
          <div class="muted">${getLeagueFlag(item.match.league)} ${item.match.league || "-"} • 📅 ${formatDate(item.match.match_date)}</div>
          <div class="prob">Força da oportunidade: ${item.prob}%</div>
          <span class="pill ${conf.className}">${conf.label}</span>

          <div class="strength-label">Barra de força — ${getStrengthText(item.prob)}</div>
          <div class="strength-bar">
            <div class="strength-fill" style="width:${strengthPercent(item.prob)}%; background:${getStrengthColor(item.prob)};"></div>
          </div>
        </div>
      `;
    }

    function renderRadarScoutly(items) {
      if (!items.length) {
        radarScoutlyEl.innerHTML = `<div class="card">Nenhuma oportunidade encontrada.</div>`;
        return;
      }

      radarScoutlyEl.innerHTML = items.map((item, index) => `
        <div class="radar-item">
          <div class="radar-top">
            <div class="rank">Top ${index + 1}</div>
          </div>

          <div class="pick-line">${getMarketEmoji(item.market)} ${item.market}</div>
          <div class="match-name">${item.match.home_team} x ${item.match.away_team}</div>
          <div class="muted">${getLeagueFlag(item.match.league)} ${item.match.league || "-"} • 📅 ${formatDate(item.match.match_date)}</div>

          <div class="strength-label">Força da oportunidade — ${getStrengthText(item.prob)} (${item.prob}%)</div>
          <div class="strength-bar">
            <div class="strength-fill" style="width:${strengthPercent(item.prob)}%; background:${getStrengthColor(item.prob)};"></div>
          </div>
        </div>
      `).join("");
    }

    function groupByLeague(matches) {
      const groups = {};
      matches.forEach(match => {
        const leagueName = match.league || "Sem liga";
        if (!groups[leagueName]) groups[leagueName] = [];
        groups[leagueName].push(match);
      });
      return groups;
    }

    function renderGames(matches) {
      const groups = groupByLeague(matches);
      const leagueNames = Object.keys(groups);

      gamesEl.innerHTML = leagueNames.map(leagueName => {
        const leagueMatches = groups[leagueName];

        const leagueBlock = leagueMatches.map(match => `
          <div class="card">
            <div class="games-list game-item">
              <div>
                <div class="match-name">${match.home_team} x ${match.away_team}</div>
                <div class="muted">${getLeagueFlag(match.league)} ${match.league || "-"} • 📅 ${formatDate(match.match_date)}</div>
              </div>
              <button class="btn" data-id="${match.id}">Ver análise →</button>
            </div>
          </div>
        `).join("");

        return `
          <div class="league-group">
            <div class="league-header">${getLeagueFlag(leagueName)} ${leagueName}</div>
            ${leagueBlock}
          </div>
        `;
      }).join("");

      const buttons = gamesEl.querySelectorAll(".btn");
      buttons.forEach(btn => {
        btn.addEventListener("click", () => {
          const match = matches.find(x => String(x.id) === String(btn.dataset.id));
          if (match) showAnalysis(match);
        });
      });
    }

    function closeAnalysis() {
      analysisEl.style.display = "none";
      analysisEl.innerHTML = "";
      window.scrollTo({
        top: document.body.scrollHeight - 400,
        behavior: "smooth"
      });
    }

    function getTopGameMarkets(match) {
      const allMarkets = [
        ...getGoalsMarkets(match),
        ...getBTTSMarkets(match),
        ...getCornersMarkets(match)
      ]
      .filter(x => x.prob > 0)
      .sort((a, b) => b.prob - a.prob);

      return allMarkets.slice(0, 3);
    }

    function showAnalysis(match) {
      const best = getBestOverallPick(match);
      const conf = getConfidence(best.prob);
      const topGameMarkets = getTopGameMarkets(match);

      analysisEl.style.display = "block";

      analysisEl.innerHTML = `
        <div class="section-title">📊 Análise do jogo</div>
        <div class="card hero">
          <div class="analysis-topbar">
            <div>
              <div class="small-label">Scoutly opportunity</div>
              <div class="big-pick">${getMarketEmoji(best.name)} ${best.name}</div>
              <div class="match-name">${match.home_team} x ${match.away_team}</div>
              <div class="muted">${getLeagueFlag(match.league)} ${match.league || "-"} • 📅 ${formatDate(match.match_date)}</div>
              <div class="prob">Força da oportunidade: ${best.prob}%</div>
              <span class="pill ${conf.className}">${conf.label}</span>

              <div class="strength-label">Barra de força — ${getStrengthText(best.prob)}</div>
              <div class="strength-bar" style="max-width:360px;">
                <div class="strength-fill" style="width:${strengthPercent(best.prob)}%; background:${getStrengthColor(best.prob)};"></div>
              </div>
            </div>

            <button class="btn-close" onclick="closeAnalysis()">Fechar ✕</button>
          </div>

          <div class="why-box">
            <div class="why-title">📊 O que os números indicam</div>
            <div class="why-item">⚽ Tendência de gols — gols esperados: <strong>${match.avg_goals ?? "-"}</strong></div>
            <div class="why-item">🚩 Tendência de escanteios — escanteios esperados: <strong>${match.avg_corners ?? "-"}</strong></div>
            <div class="why-item">🔥 Intensidade ofensiva — finalizações esperadas: <strong>${match.avg_shots ?? "-"}</strong></div>
          </div>

          <div class="why-box">
            <div class="why-title">🎯 Melhores entradas deste jogo</div>
            ${topGameMarkets.map((item, index) => `
              <div class="why-item">
                Top ${index + 1} — ${getMarketEmoji(item.name)} <strong>${item.name}</strong> (${item.prob}%)
              </div>
            `).join("")}
          </div>

          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-title">⚽ Gols esperados</div>
              <div class="stat-value">${match.avg_goals ?? "-"}</div>
            </div>
            <div class="stat-box">
              <div class="stat-title">🚩 Escanteios esperados</div>
              <div class="stat-value">${match.avg_corners ?? "-"}</div>
            </div>
            <div class="stat-box">
              <div class="stat-title">🎯 Finalizações</div>
              <div class="stat-value">${match.avg_shots ?? "-"}</div>
            </div>
          </div>
        </div>
      `;

      analysisEl.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    async function loadScoutly() {
      try {
        if (SUPABASE_KEY.includes("COLE_SUA_PUBLISHABLE_KEY_AQUI")) {
          setStatus("Falta colar a publishable key no código.", "err");
          return;
        }

        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const { data, error } = await client
          .from("matches")
          .select("*")
          .order("match_date", { ascending: true });

        if (error) {
          setStatus("Erro ao ler tabela matches: " + error.message, "err");
          return;
        }

        if (!data || data.length === 0) {
          setStatus("Conexão OK, mas não há jogos na tabela matches.", "err");
          return;
        }

        setStatus("Conexão OK. Jogos encontrados: " + data.length, "ok");

        const allRadarItems = buildRadarItems(data);
        const dayOpportunity = allRadarItems[0] || null;

        const radarItems = allRadarItems
          .filter(item => !dayOpportunity || item.id !== dayOpportunity.id)
          .slice(0, 5);

        renderDayOpportunity(dayOpportunity);
        renderRadarScoutly(radarItems);
        renderGames(data);

      } catch (err) {
        setStatus("Erro geral: " + err.message, "err");
      }
    }

    loadScoutly();
  </script>
</body>
</html>
