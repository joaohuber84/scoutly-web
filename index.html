<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scoutly</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    * {
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: #22c55e;
      margin-bottom: 28px;
      font-size: 32px;
    }

    .section {
      margin-bottom: 24px;
    }

    .section-title {
      color: #22c55e;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .radar-box {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }

    .radar-subtitle {
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .radar-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .radar-item {
      background: #0b1220;
      border: 1px solid #1f2937;
      border-left: 4px solid #22c55e;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      cursor: pointer;
    }

    .radar-item:hover {
      transform: translateY(-2px);
      border-color: #22c55e;
      background: #10192e;
    }

    .radar-item:last-child {
      margin-bottom: 0;
    }

    .radar-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .radar-rank {
      color: #22c55e;
      font-weight: bold;
      font-size: 12px;
      text-transform: uppercase;
    }

    .radar-prob {
      font-weight: bold;
      color: #22c55e;
      white-space: nowrap;
    }

    .radar-market {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .radar-game {
      color: #cbd5e1;
      font-size: 14px;
    }

    .match {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      scroll-margin-top: 20px;
    }

    .teams {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 20px;
      font-weight: bold;
    }

    .team {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 30px;
      height: 30px;
      object-fit: contain;
      background: white;
      border-radius: 50%;
      padding: 2px;
    }

    .vs {
      color: #22c55e;
      font-weight: bold;
      font-size: 18px;
    }

    .meta {
      margin-top: 10px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.5;
    }

    .opportunity {
      margin-top: 18px;
      background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(34,197,94,0.05));
      border: 1px solid rgba(34,197,94,0.35);
      border-left: 5px solid #22c55e;
      border-radius: 12px;
      padding: 16px;
    }

    .opportunity-title {
      color: #22c55e;
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .opportunity-market {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .opportunity-info {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 14px;
      color: #e2e8f0;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .conf-high {
      background: rgba(34,197,94,0.15);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.35);
    }

    .conf-medium {
      background: rgba(234,179,8,0.15);
      color: #eab308;
      border: 1px solid rgba(234,179,8,0.35);
    }

    .conf-low {
      background: rgba(239,68,68,0.15);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.35);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .stat {
      background: #0b1220;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat-title {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: bold;
    }

    .secondary {
      margin-top: 16px;
      background: #0b1220;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 14px;
    }

    .secondary-title {
      color: #22c55e;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .trend {
      margin-bottom: 12px;
    }

    .trend:last-child {
      margin-bottom: 0;
    }

    .trend-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 4px;
      color: #e2e8f0;
    }

    .bar {
      background: #1f2937;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
    }

    .fill {
      background: #22c55e;
      height: 100%;
    }

    .form-section {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 16px;
      background: #0b1220;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 14px;
    }

    .form-team {
      flex: 1;
    }

    .form-team-title {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .form {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .form span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: bold;
      color: white;
    }

    .form-win {
      background: #22c55e;
    }

    .form-draw {
      background: #eab308;
      color: #111827;
    }

    .form-loss {
      background: #ef4444;
    }

    .power-section {
      margin-top: 16px;
      background: #0b1220;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 14px;
    }

    .power-title {
      color: #22c55e;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .power-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .power-box {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .power-name {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    .power-value {
      font-size: 22px;
      font-weight: bold;
    }

    @media (max-width: 700px) {
      .teams,
      .form-section,
      .power-grid,
      .stats {
        display: block;
      }

      .team {
        justify-content: center;
        margin-bottom: 10px;
      }

      .vs {
        display: block;
        text-align: center;
        margin: 10px 0;
      }

      .stat,
      .form-team,
      .power-box {
        margin-bottom: 10px;
      }

      .radar-head {
        display: block;
      }

      .radar-prob {
        margin-top: 6px;
        display: inline-block;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Scoutly ⚽</h1>

    <div class="section">
      <div class="radar-box">
        <div class="section-title">🔥 Scoutly Radar</div>
        <div class="radar-subtitle">Top 10 oportunidades do dia</div>
        <div id="radar">Carregando radar...</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">⚽ Jogos do dia</div>
      <div id="matches">Carregando jogos...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://zngdcatlxlxamceqpxij.supabase.co";
    const SUPABASE_KEY = "sb_publishable_gw3BGCEcwhidS2hFbiwxIA_W28KkZ2a";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function formatForm(form) {
      if (!form) return "";
      return form.split("").map(letter => {
        if (letter === "W") return '<span class="form-win">W</span>';
        if (letter === "D") return '<span class="form-draw">D</span>';
        if (letter === "L") return '<span class="form-loss">L</span>';
        return "";
      }).join("");
    }

    function getConfidence(prob) {
      const p = Number(prob) || 0;
      if (p >= 65) return { label: "Confiança Alta", className: "conf-high" };
      if (p >= 55) return { label: "Confiança Média", className: "conf-medium" };
      return { label: "Confiança Baixa", className: "conf-low" };
    }

    function getBestOpportunity(match) {
      const markets = [
        { name: "Over 2.5 gols", prob: Number(match.over25_prob) || 0 },
        { name: "BTTS", prob: Number(match.btts_prob) || 0 },
        { name: "Over 8.5 cantos", prob: Number(match.corners_over85_prob) || 0 }
      ];

      markets.sort((a, b) => b.prob - a.prob);
      return markets[0];
    }

    function generateRadar(matches) {
      let opportunities = [];

      matches.forEach(match => {
        opportunities.push({
          matchId: match.id,
          market: "Over 2.5 gols",
          prob: Number(match.over25_prob) || 0,
          game: `${match.home_team} x ${match.away_team}`
        });

        opportunities.push({
          matchId: match.id,
          market: "BTTS",
          prob: Number(match.btts_prob) || 0,
          game: `${match.home_team} x ${match.away_team}`
        });

        opportunities.push({
          matchId: match.id,
          market: "Over 8.5 cantos",
          prob: Number(match.corners_over85_prob) || 0,
          game: `${match.home_team} x ${match.away_team}`
        });
      });

      opportunities.sort((a, b) => b.prob - a.prob);

      return opportunities.slice(0, 10);
    }

    async function loadMatches() {
      const radarContainer = document.getElementById("radar");
      const matchesContainer = document.getElementById("matches");

      radarContainer.innerHTML = "Carregando radar...";
      matchesContainer.innerHTML = "Carregando jogos...";

      try {
        const { data, error } = await client
          .from("matches")
          .select("*")
          .order("match_date", { ascending: true });

        if (error) {
          console.log("ERRO SUPABASE:", error);
          radarContainer.innerHTML = "Erro ao carregar radar";
          matchesContainer.innerHTML = "Erro ao carregar jogos";
          return;
        }

        if (!data || data.length === 0) {
          radarContainer.innerHTML = "Nenhuma oportunidade encontrada.";
          matchesContainer.innerHTML = "Nenhum jogo encontrado.";
          return;
        }

        const radar = generateRadar(data);

        const radarHTML = radar.map((item, index) => `
          <a class="radar-link" href="#match-${item.matchId}">
            <div class="radar-item">
              <div class="radar-head">
                <span class="radar-rank">#${index + 1} oportunidade</span>
                <span class="radar-prob">${item.prob}%</span>
              </div>
              <div class="radar-market">${item.market}</div>
              <div class="radar-game">${item.game}</div>
            </div>
          </a>
        `).join("");

        radarContainer.innerHTML = radarHTML;

        const matchesHTML = data.map(m => {
          const best = getBestOpportunity(m);
          const confidence = getConfidence(best.prob);

          return `
            <div class="match" id="match-${m.id}">

              <div class="teams">
                <div class="team">
                  <img class="logo" src="${m.home_logo || ""}" onerror="this.style.display='none'">
                  <span>${m.home_team || "-"}</span>
                </div>

                <div class="vs">x</div>

                <div class="team">
                  <span>${m.away_team || "-"}</span>
                  <img class="logo" src="${m.away_logo || ""}" onerror="this.style.display='none'">
                </div>
              </div>

              <div class="meta">
                Liga: ${m.league || "-"}<br>
                Data: ${m.match_date ? new Date(m.match_date).toLocaleDateString("pt-BR") : "Sem data"}
              </div>

              <div class="opportunity">
                <div class="opportunity-title">Scoutly Opportunity</div>
                <div class="opportunity-market">${best.name}</div>
                <div class="opportunity-info">
                  <span>Probabilidade: <strong>${best.prob}%</strong></span>
                  <span class="badge ${confidence.className}">${confidence.label}</span>
                </div>
              </div>

              <div class="stats">
                <div class="stat">
                  <div class="stat-title">Média gols</div>
                  <div class="stat-value">${m.avg_goals ?? "-"}</div>
                </div>

                <div class="stat">
                  <div class="stat-title">Escanteios</div>
                  <div class="stat-value">${m.avg_corners ?? "-"}</div>
                </div>

                <div class="stat">
                  <div class="stat-title">Chutes</div>
                  <div class="stat-value">${m.avg_shots ?? "-"}</div>
                </div>
              </div>

              <div class="secondary">
                <div class="secondary-title">Outras Tendências</div>

                <div class="trend">
                  <div class="trend-label">
                    <span>Over 2.5</span>
                    <span>${m.over25_prob ?? 0}%</span>
                  </div>
                  <div class="bar">
                    <div class="fill" style="width:${m.over25_prob ?? 0}%"></div>
                  </div>
                </div>

                <div class="trend">
                  <div class="trend-label">
                    <span>BTTS</span>
                    <span>${m.btts_prob ?? 0}%</span>
                  </div>
                  <div class="bar">
                    <div class="fill" style="width:${m.btts_prob ?? 0}%"></div>
                  </div>
                </div>

                <div class="trend">
                  <div class="trend-label">
                    <span>Over 8.5 Cantos</span>
                    <span>${m.corners_over85_prob ?? 0}%</span>
                  </div>
                  <div class="bar">
                    <div class="fill" style="width:${m.corners_over85_prob ?? 0}%"></div>
                  </div>
                </div>
              </div>

              <div class="form-section">
                <div class="form-team">
                  <div class="form-team-title">${m.home_team || "Mandante"} - Forma</div>
                  <div class="form">${formatForm(m.home_form)}</div>
                </div>

                <div class="form-team">
                  <div class="form-team-title">${m.away_team || "Visitante"} - Forma</div>
                  <div class="form">${formatForm(m.away_form)}</div>
                </div>
              </div>

              <div class="power-section">
                <div class="power-title">Power Rating</div>
                <div class="power-grid">
                  <div class="power-box">
                    <div class="power-name">${m.home_team || "-"}</div>
                    <div class="power-value">${m.power_home ?? "-"}</div>
                  </div>

                  <div class="power-box">
                    <div class="power-name">${m.away_team || "-"}</div>
                    <div class="power-value">${m.power_away ?? "-"}</div>
                  </div>
                </div>
              </div>

            </div>
          `;
        }).join("");

        matchesContainer.innerHTML = matchesHTML;

      } catch (err) {
        console.log("ERRO GERAL:", err);
        radarContainer.innerHTML = "Erro geral no radar";
        matchesContainer.innerHTML = "Erro geral no script";
      }
    }

    loadMatches();
  </script>
</body>
</html>
