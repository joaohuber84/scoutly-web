<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoutly</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

h1{
color:#22c55e;
text-align:center;
margin-bottom:30px;
}

.game{
background:#111827;
border-radius:12px;
padding:20px;
margin-bottom:18px;
border:1px solid #1f2937;
}

.teams{
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
font-weight:bold;
}

.logo{
width:34px;
height:34px;
object-fit:contain;
background:white;
border-radius:50%;
padding:3px;
margin-right:8px;
}

.team{
display:flex;
align-items:center;
}

.vs{
color:#22c55e;
font-weight:bold;
}

.meta{
margin-top:12px;
font-size:14px;
color:#cbd5e1;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:15px;
}

.stat{
background:#0b1220;
padding:10px;
border-radius:8px;
text-align:center;
width:32%;
}

.stat-title{
font-size:12px;
color:#94a3b8;
}

.stat-value{
font-size:18px;
font-weight:bold;
}

.insight{
margin-top:14px;
background:#0b1220;
padding:10px;
border-left:4px solid #22c55e;
border-radius:8px;
}

.probabilities{
margin-top:15px;
}

.prob-row{
margin-bottom:8px;
}

.bar{
background:#1f2937;
height:10px;
border-radius:6px;
overflow:hidden;
}

.fill{
background:#22c55e;
height:10px;
}

.label{
display:flex;
justify-content:space-between;
font-size:12px;
margin-bottom:3px;
}

</style>
</head>

<body>

<div class="container">

<h1>Scoutly ⚽</h1>

<div id="games">Carregando...</div>

</div>

<script>

const SUPABASE_URL="https://zngdcatlxlxamceqpxij.supabase.co"
const SUPABASE_KEY="sb_publishable_gw3BGCEcwhidS2hFbiwxIA_W28KkZ2a"

const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function loadGames(){

const el=document.getElementById("games")

const {data,error}=await client
.from("matches")
.select("*")
.order("match_date",{ascending:true})

if(error){

el.innerHTML="Erro carregando jogos"
return

}

const html=data.map(game=>`

<div class="game">

<div class="teams">

<div class="team">
<img class="logo" src="${game.home_logo}" onerror="this.style.display='none'">
${game.home_team}
</div>

<div class="vs">x</div>

<div class="team">
${game.away_team}
<img class="logo" src="${game.away_logo}" onerror="this.style.display='none'">
</div>

</div>

<div class="meta">
Liga: ${game.league}<br>
Data: ${game.match_date ? new Date(game.match_date).toLocaleDateString("pt-BR") : "Sem data"}
</div>

<div class="stats">

<div class="stat">
<div class="stat-title">Média gols</div>
<div class="stat-value">${game.avg_goals ?? "-"}</div>
</div>

<div class="stat">
<div class="stat-title">Escanteios</div>
<div class="stat-value">${game.avg_corners ?? "-"}</div>
</div>

<div class="stat">
<div class="stat-title">Chutes</div>
<div class="stat-value">${game.avg_shots ?? "-"}</div>
</div>

</div>

<div class="insight">
<b>Scoutly Insight</b><br>
${game.insight ?? "Sem insight"}
</div>

<div class="probabilities">

<div class="prob-row">

<div class="label">
<span>${game.home_team}</span>
<span>${game.home_win_prob ?? "-"}%</span>
</div>

<div class="bar">
<div class="fill" style="width:${game.home_win_prob ?? 0}%"></div>
</div>

</div>

<div class="prob-row">

<div class="label">
<span>Empate</span>
<span>${game.draw_prob ?? "-"}%</span>
</div>

<div class="bar">
<div class="fill" style="width:${game.draw_prob ?? 0}%"></div>
</div>

</div>

<div class="prob-row">

<div class="label">
<span>${game.away_team}</span>
<span>${game.away_win_prob ?? "-"}%</span>
</div>

<div class="bar">
<div class="fill" style="width:${game.away_win_prob ?? 0}%"></div>
</div>

</div>

</div>

</div>

`).join("")

el.innerHTML=html

}

loadGames()

</script>

</body>
</html>
