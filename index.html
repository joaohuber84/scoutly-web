<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scoutly</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial, sans-serif; background:#0f172a; color:#fff; padding:20px; }
    h1 { color:#22c55e; margin:0 0 16px 0; }
    .game { background:#111827; padding:12px 14px; border-radius:10px; margin-bottom:10px; }
    .meta { opacity:.85; font-size: 14px; margin-top: 4px; }
  </style>
</head>

<body>

  <h1>Scoutly ⚽</h1>

  <div id="games">Carregando jogos...</div>

  <script>
    const SUPABASE_URL = "https://zngdcatlxlxamceqpxij.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_gw3BGCEcwhidS2hFbiwxIA_W28KkZ2a";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadGames() {

      const el = document.getElementById("games");
      el.innerHTML = "Carregando jogos...";

      const { data, error } = await client
        .from("matches")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.log("ERRO:", error);
        el.innerHTML = "Erro ao carregar jogos";
        return;
      }

      if (!data || data.length === 0) {
        el.innerHTML = "Nenhum jogo encontrado.";
        return;
      }

      const gamesHTML = data.map(game => `
        <div class="game">
          <strong>${game.home_team} x ${game.away_team}</strong>
          <div class="meta">
            Liga: ${game.league || "Não definida"}<br>
            Data: ${game.match_date ? new Date(game.match_date).toLocaleDateString("pt-BR") : "Sem data"}
          </div>
        </div>
      `).join("");

      el.innerHTML = gamesHTML;
    }

    loadGames();
  </script>

</body>
</html>
