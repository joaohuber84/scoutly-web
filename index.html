<script>
  const supabaseClient = window.supabase.createClient(
    'https://zngdcatlxlxamceqpxij.supabase.co',
    'SUA_ANON_KEY_AQUI'
  );

  const state = {
    dailyPicks: [],
    matches: [],
    competitions: [],
    selectedLeague: null,
    currentTicket: []
  };

  function toNumber(value, fallback = null) {
    const num = Number(value);
    return Number.isFinite(num) ? num : fallback;
  }

  function clamp(value, min = 0, max = 1) {
    return Math.max(min, Math.min(max, value));
  }

  function maybeJson(value) {
    if (!value) return null;
    if (typeof value === 'object') return value;

    try {
      return JSON.parse(value);
    } catch {
      return null;
    }
  }

  function getMatchProbability(match) {
    const direct =
      toNumber(match.probability, null) ??
      toNumber(match.main_probability, null) ??
      toNumber(match.confidence_score, null);

    if (direct !== null) {
      return direct > 1 ? clamp(direct / 100, 0, 1) : clamp(direct, 0, 1);
    }

    return 0.6;
  }

  function probabilityToTier(prob) {
    if (prob >= 0.80) return 'Muito forte';
    if (prob >= 0.70) return 'Boa';
    if (prob >= 0.60) return 'Moderada';
    return 'Extra';
  }

  function getPrimaryPick(match) {
    return (
      match.best_pick_1 ||
      match.safe_pick ||
      match.pick ||
      'Mercado em análise'
    );
  }

  // =========================================================
  // 🔥 CORAÇÃO DO FIX — GET METRICS (AGORA CORRETO)
  // =========================================================
  function getMetrics(match) {
    const metrics = maybeJson(match.metrics) || {};

    // 🔴 PRIORIDADE TOTAL: MATCH_ANALYSIS
    const expectedGoals =
      toNumber(match.expected_home_goals, 0) +
      toNumber(match.expected_away_goals, 0);

    const expectedCorners =
      toNumber(match.expected_corners, null);

    const expectedShots =
      toNumber(match.expected_home_shots, 0) +
      toNumber(match.expected_away_shots, 0);

    const expectedSOT =
      toNumber(match.expected_home_sot, 0) +
      toNumber(match.expected_away_sot, 0);

    const expectedCards =
      toNumber(match.expected_cards, null);

    // 🟡 FALLBACK: MATCHES
    const fallbackGoals =
      toNumber(match.avg_goals, null) ??
      toNumber(metrics.goals, null);

    const fallbackCorners =
      toNumber(match.avg_corners, null) ??
      toNumber(metrics.corners, null);

    const fallbackShots =
      toNumber(match.avg_shots, null) ??
      toNumber(metrics.shots, null);

    const fallbackSOT =
      toNumber(match.avg_shots_on_target, null) ??
      toNumber(metrics.shots_on_target, null);

    const fallbackCards =
      toNumber(match.avg_cards, null) ??
      toNumber(metrics.cards, null);

    return {
      avgGoals: expectedGoals || fallbackGoals,
      avgCorners: expectedCorners ?? fallbackCorners,
      avgShots: expectedShots || fallbackShots,
      avgShotsOnTarget: expectedSOT || fallbackSOT,
      avgCards: expectedCards ?? fallbackCards
    };
  }

  // =========================================================
  // 📊 STATS FORMATADOS
  // =========================================================
  function getStats(match) {
    const {
      avgGoals,
      avgCorners,
      avgShots,
      avgShotsOnTarget,
      avgCards
    } = getMetrics(match);

    return [
      { label: 'Gols esperados', value: avgGoals?.toFixed(2) || '-' },
      { label: 'Escanteios', value: avgCorners?.toFixed(1) || '-' },
      { label: 'Finalizações', value: avgShots?.toFixed(0) || '-' },
      { label: 'No gol', value: avgShotsOnTarget?.toFixed(0) || '-' },
      { label: 'Cartões', value: avgCards?.toFixed(1) || '-' }
    ];
  }

  // =========================================================
  // 🧠 INSIGHT (AGORA USA ANALYSIS)
  // =========================================================
  function getInsight(match) {
    return (
      match.analysis_text ||
      match.insight ||
      'Leitura baseada nos dados do confronto.'
    );
  }

  // =========================================================
  // 📈 MERCADOS DETECTADOS (ORDEM CORRETA)
  // =========================================================
  function getMarkets(match) {
    const markets = [];

    function push(m) {
      if (!m) return;
      if (!markets.includes(m)) markets.push(m);
    }

    push(match.best_pick_1);
    push(match.best_pick_2);
    push(match.best_pick_3);
    push(match.safe_pick);
    push(match.balanced_pick);
    push(match.aggressive_pick);
    push(match.value_pick);

    return markets.slice(0, 4);
  }

  // =========================================================
  // 🔄 LOAD MATCHES (COM ANALYSIS CORRETO)
  // =========================================================
  async function loadMatches() {
    const { data: matchesData } = await supabaseClient
      .from('matches')
      .select('*');

    const { data: analysisData } = await supabaseClient
      .from('match_analysis')
      .select('*');

    const map = new Map(
      (analysisData || []).map(a => [String(a.match_id), a])
    );

    state.matches = (matchesData || []).map(m => ({
      ...m,
      ...(map.get(String(m.id)) || {})
    }));

    console.log('MATCHES:', state.matches.length);
  }

// =========================================================

  // =========================================================

    'La Liga': { label: 'La Liga', badge: 'ES', sort: 33 },
    'Premier League': { label: 'Premier League', badge: 'GB', sort: 34 },

    'MLS': { label: 'MLS', badge: 'US', sort: 40 },
    'Austrian Bundesliga': { label: 'Austrian Bundesliga', badge: 'AT', sort: 41 },
    'Belgian Pro League': { label: 'Bélgica', badge: 'BE', sort: 42 },
    'Superliga': { label: 'Dinamarca', badge: 'DK', sort: 43 },
    'Super League Greece': { label: 'Grécia', badge: 'GR', sort: 44 },
    'Super Lig': { label: 'Turquia', badge: 'TR', sort: 45 },
    'Süper Lig': { label: 'Turquia', badge: 'TR', sort: 45 },

  };

  function getLeagueDisplay(league) {
    return leagueMeta[league]?.label || league || '-';
  }

  function getLeagueBadge(league) {
    return leagueMeta[league]?.badge || 'LG';
  }

  function getLeagueSort(league) {
    return leagueMeta[league]?.sort || 999;
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function formatKickoff(value) {
    if (!value) return 'Horário não disponível';
    const d = new Date(value);
    if (Number.isNaN(d.getTime())) return 'Horário não disponível';

    return d.toLocaleString('pt-BR', {
      day: '2-digit',
      month: '2-digit',
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function setStatus(text, ok = true) {
    const chip = document.getElementById('statusChip');
    const txt = document.getElementById('statusText');
    if (!chip || !txt) return;

    txt.textContent = text;
    chip.style.borderColor = ok
      ? 'rgba(0,255,136,0.18)'
      : 'rgba(255,107,122,0.22)';
  }

  function shouldHideLeague(leagueName) {
    const name = String(leagueName || '').toLowerCase();

    return (
      name.includes('u17') ||
      name.includes('u18') ||
      name.includes('u19') ||
      name.includes('u20') ||
      name.includes('u21') ||
      name.includes('u23') ||
      name.includes('under 17') ||
      name.includes('under 18') ||
      name.includes('under 19') ||
      name.includes('under 20') ||
      name.includes('under 21') ||
      name.includes('under 23') ||
      name.includes('sub 17') ||
      name.includes('sub 18') ||
      name.includes('sub 19') ||
      name.includes('sub 20') ||
      name.includes('sub 21') ||
      name.includes('sub 23') ||
      name.includes('reserve') ||
      name.includes('reserves') ||
      name.includes('open cup')
    );
  }

  function isMatchVisible(value) {
    if (!value) return false;

    const d = new Date(value);
    if (Number.isNaN(d.getTime())) return false;

    const now = new Date();
    const end = new Date(now);
    end.setDate(end.getDate() + 5);
    end.setHours(23, 59, 59, 999);

    return d >= now && d <= end;
  }

  function isCompetitionVisible(value) {
    if (!value) return false;

    const d = new Date(value);
    if (Number.isNaN(d.getTime())) return false;

    const now = new Date();
    const start = new Date(now);
    start.setHours(0, 0, 0, 0);

    const end = new Date(now);
    end.setDate(end.getDate() + 5);
    end.setHours(23, 59, 59, 999);

    return d >= start && d <= end;
  }

  function getVisibleMatches() {
    return state.matches.filter(match =>
      isMatchVisible(match.kickoff) && !shouldHideLeague(match.league)
    );
  }

  function getMatchById(id) {
    return state.matches.find(match => String(match.id) === String(id)) || null;
  }

  function getMatchTier(match) {
    return match.strength || probabilityToTier(getMatchProbability(match));
  }

  function teamInitials(name) {
    if (!name) return 'TM';
    return String(name)
      .trim()
      .split(/\s+/)
      .slice(0, 2)
      .map(word => word[0]?.toUpperCase() || '')
      .join('') || 'TM';
  }

  function teamLogoUrl(match, side) {
    const keys = side === 'home'
      ? ['home_logo', 'home_logo_url', 'home_badge', 'home_badge_url']
      : ['away_logo', 'away_logo_url', 'away_badge', 'away_badge_url'];

    for (const key of keys) {
      const value = match?.[key];
      if (typeof value === 'string' && value.trim()) return value.trim();
    }

    return '';
  }

  function teamBadge(match, side) {
    const teamName = side === 'home' ? match?.home_team : match?.away_team;
    const logo = teamLogoUrl(match, side);

    if (logo) {
      return `
        <div class="team-badge">
          <img src="${escapeHtml(logo)}" alt="${escapeHtml(teamName || 'Time')}" onerror="this.style.display='none'; this.parentNode.textContent='${escapeHtml(teamInitials(teamName))}';" />
        </div>
      `;
    }

    return `<div class="team-badge">${escapeHtml(teamInitials(teamName))}</div>`;
  }

  function chipClass(tier) {
    if (tier === 'Muito forte') return 'chip chip-very-strong';
    if (tier === 'Boa') return 'chip chip-good';
    if (tier === 'Moderada') return 'chip chip-moderate';
    return 'chip chip-extra';
  }

  function chipMarkup(tier) {
    const emoji =
      tier === 'Muito forte' ? '🔥' :
      tier === 'Boa' ? '🟢' :
      tier === 'Moderada' ? '🟡' :
      '🔵';

    return `<span class="${chipClass(tier)}">${emoji} ${escapeHtml(tier)}</span>`;
  }

  // =========================================================
  // 🎯 DAILY PICKS / TICKET
  // =========================================================
  function getDailyPicksForMatch(matchId) {
    return state.dailyPicks
      .filter(item => String(item.match_id) === String(matchId))
      .sort((a, b) => Number(a.rank || 999) - Number(b.rank || 999));
  }

  function normalizeTicketPick(rawPick) {
    const match = getMatchById(rawPick.match_id);
    if (!match) return null;

    const probability = Number(rawPick.probability ?? getMatchProbability(match));
    const tier = probabilityToTier(probability);

    return {
      match_id: match.id,
      home_team: match.home_team,
      away_team: match.away_team,
      league: match.league,
      country: match.country,
      kickoff: rawPick.kickoff || match.kickoff,
      market: rawPick.market || getPrimaryPick(match),
      probability,
      tier,
      home_logo: rawPick.home_logo || match.home_logo || null,
      away_logo: rawPick.away_logo || match.away_logo || null,
      tierWeight:
        tier === 'Muito forte' ? 4 :
        tier === 'Boa' ? 3 :
        tier === 'Moderada' ? 2 : 1
    };
  }

  function buildDailyTicketPool() {
    return state.dailyPicks
      .filter(item => item && item.match_id && item.market)
      .map(normalizeTicketPick)
      .filter(Boolean);
  }

  function buildFallbackTicketPool() {
    return getVisibleMatches()
      .sort((a, b) => {
        const pDiff = getMatchProbability(b) - getMatchProbability(a);
        if (pDiff !== 0) return pDiff;
        return Number(b.priority || 0) - Number(a.priority || 0);
      })
      .slice(0, 12)
      .map(match => normalizeTicketPick({
        match_id: match.id,
        market: getPrimaryPick(match),
        probability: getMatchProbability(match),
        kickoff: match.kickoff,
        home_logo: match.home_logo,
        away_logo: match.away_logo
      }))
      .filter(Boolean);
  }

  function uniqueByMatchAndMarket(items) {
    const seen = new Set();

    return items.filter(item => {
      const key = `${item.match_id}::${String(item.market).toLowerCase()}`;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  function buildSmartTicketPool() {
    return uniqueByMatchAndMarket([
      ...buildDailyTicketPool(),
      ...buildFallbackTicketPool()
    ]).sort((a, b) => {
      if (b.tierWeight !== a.tierWeight) return b.tierWeight - a.tierWeight;
      return Number(b.probability || 0) - Number(a.probability || 0);
    });
  }

  function chooseTicketLegs() {
    const pool = buildSmartTicketPool();
    if (!pool.length) return [];

    const selected = [];
    const usedMatches = new Set();
    const usedLeagues = new Set();

    for (const item of pool) {
      if (usedMatches.has(String(item.match_id))) continue;
      if (usedLeagues.has(String(item.league)) && selected.length < 2) continue;

      selected.push(item);
      usedMatches.add(String(item.match_id));
      usedLeagues.add(String(item.league));

      if (selected.length === 3) break;
    }

    return selected;
  }

  function renderTicket() {
    const container = document.getElementById('ticketContainer');
    const legs = chooseTicketLegs();
    state.currentTicket = legs;

    if (!legs.length) {
      container.innerHTML = `<div class="empty-state">Nenhuma oportunidade disponível para montar o bilhete.</div>`;
      return;
    }

    const avgProbability = legs.reduce((acc, leg) => acc + Number(leg.probability || 0), 0) / legs.length;
    const confidenceLabel = probabilityToTier(avgProbability);

    container.innerHTML = `
      <div class="ticket-legs">
        ${legs.map(leg => `
          <div class="ticket-leg">
            <div class="teams-row compact">
              ${teamBadge(leg, 'home')}
              <div class="team-names">${escapeHtml(leg.home_team)} x ${escapeHtml(leg.away_team)}</div>
              ${teamBadge(leg, 'away')}
            </div>

            <div class="chip-row">
              ${chipMarkup(leg.tier)}
            </div>

            <div class="ticket-market">${escapeHtml(leg.market)}</div>

            <div class="radar-kickoff">
              ${escapeHtml(getLeagueDisplay(leg.league))} • ${escapeHtml(formatKickoff(leg.kickoff))}
            </div>
          </div>
        `).join('')}
      </div>

      <div class="ticket-footer">
        <div class="ticket-confidence">Confiança geral: ${escapeHtml(confidenceLabel)}</div>
        <div class="ticket-helper">Bilhete montado com leitura automática do Scoutly.</div>
      </div>
    `;
  }

  // =========================================================
  // 📡 RADAR
  // =========================================================
  function renderRadar() {
    const list = document.getElementById('radarList');

    const rankedFromDaily = state.dailyPicks
      .map(item => {
        const match = getMatchById(item.match_id);
        if (!match) return null;

        return {
          ...match,
          radar_market: item.market || getPrimaryPick(match),
          radar_probability: Number(item.probability || getMatchProbability(match)),
          radar_rank: Number(item.rank || 999)
        };
      })
      .filter(Boolean)
      .filter(item => isMatchVisible(item.kickoff) && !shouldHideLeague(item.league))
      .sort((a, b) => {
        if (a.radar_rank !== b.radar_rank) return a.radar_rank - b.radar_rank;
        return b.radar_probability - a.radar_probability;
      });

    const fallback = getVisibleMatches()
      .filter(match => !rankedFromDaily.some(item => String(item.id) === String(match.id)))
      .sort((a, b) => {
        const pDiff = getMatchProbability(b) - getMatchProbability(a);
        if (pDiff !== 0) return pDiff;
        return Number(b.priority || 0) - Number(a.priority || 0);
      })
      .slice(0, 12)
      .map((match, index) => ({
        ...match,
        radar_market: getPrimaryPick(match),
        radar_probability: getMatchProbability(match),
        radar_rank: rankedFromDaily.length + index + 1
      }));

    const merged = [...rankedFromDaily, ...fallback];
    const leagueCount = {};
    const radarItems = [];

    for (const item of merged) {
      const leagueKey = String(item.league || '').toLowerCase();
      leagueCount[leagueKey] = leagueCount[leagueKey] || 0;
      if (leagueCount[leagueKey] >= 2) continue;

      radarItems.push(item);
      leagueCount[leagueKey] += 1;

      if (radarItems.length === 10) break;
    }

    if (!radarItems.length) {
      list.innerHTML = `<div class="empty-state">Nenhuma oportunidade encontrada para hoje.</div>`;
      return;
    }

    list.innerHTML = radarItems.map((item, index) => {
      const tier = probabilityToTier(item.radar_probability);

      return `
        <div class="radar-item" data-match-id="${escapeHtml(item.id)}">
          <div class="radar-top">
            <div class="radar-rank">${index + 1}</div>
            <div class="league-pill">
              <span>${escapeHtml(getLeagueBadge(item.league))}</span>
              <span>${escapeHtml(getLeagueDisplay(item.league))}</span>
            </div>
          </div>

          <div class="teams-row compact">
            ${teamBadge(item, 'home')}
            <div class="team-names">${escapeHtml(item.home_team)} x ${escapeHtml(item.away_team)}</div>
            ${teamBadge(item, 'away')}
          </div>

          <div class="chip-row">
            ${chipMarkup(tier)}
          </div>

          <div class="radar-market">${escapeHtml(item.radar_market)}</div>
          <div class="radar-kickoff">
            ${escapeHtml(getLeagueDisplay(item.league))} • ${escapeHtml(formatKickoff(item.kickoff))}
          </div>
        </div>
      `;
    }).join('');

    list.querySelectorAll('.radar-item').forEach(el => {
      el.addEventListener('click', () => openAnalysis(el.dataset.matchId));
    });
  }

  // =========================================================
  // 🌍 COMPETIÇÕES
  // =========================================================
  function getFlag(country) {
    const flags = {
      Brazil: 'BR',
      England: 'GB',
      Spain: 'ES',
      Italy: 'IT',
      Germany: 'DE',
      France: 'FR',
      Portugal: 'PT',
      Netherlands: 'NL',
      Belgium: 'BE',
      USA: 'US',
      Argentina: 'AR',
      Mexico: 'MX',
      Turkey: 'TR',
      Greece: 'GR',
      Switzerland: 'CH',
      Denmark: 'DK',
      Austria: 'AT',
      'Saudi Arabia': 'SA',
      KSA: 'SA',
      World: null
    };

    return flags[country] || null;
  }

  function buildCompetitions() {
    const map = new Map();

    const visibleMatches = state.matches.filter(match =>
      isCompetitionVisible(match.kickoff) && !shouldHideLeague(match.league)
    );

    for (const match of visibleMatches) {
      const league = match.league || '';
      const country = match.country || null;

      if (!map.has(league)) {
        map.set(league, {
          league,
          country,
          count: 0,
          matches: []
        });
      }

      const item = map.get(league);
      if (!item.country && country) item.country = country;

      item.count += 1;
      item.matches.push(match);
    }

    state.competitions = Array.from(map.values()).sort(
      (a, b) => getLeagueSort(a.league) - getLeagueSort(b.league)
    );
  }

  function renderCompetitions() {
    buildCompetitions();
    const grid = document.getElementById('competitionsGrid');

    if (!state.competitions.length) {
      grid.innerHTML = `<div class="empty-state">Nenhuma competição encontrada para os próximos jogos.</div>`;
      return;
    }

    grid.innerHTML = state.competitions.map(comp => {
      const flagCode = getFlag(comp.country);
      const flagMarkup = flagCode
        ? `<img src="https://flagcdn.com/w40/${flagCode.toLowerCase()}.png" width="28" alt="${escapeHtml(comp.country || 'flag')}" />`
        : `<span>${escapeHtml(getLeagueBadge(comp.league))}</span>`;

      return `
        <div class="competition-card" data-league="${encodeURIComponent(comp.league)}" role="button" tabindex="0">
          <div class="competition-top">
            <div class="competition-flag">${flagMarkup}</div>
            <div class="competition-count">${comp.count} jogo(s)</div>
          </div>

          <div class="competition-name">${escapeHtml(getLeagueDisplay(comp.league))}</div>
          <div class="competition-bottom">Toque para ver os jogos desta competição.</div>
        </div>
      `;
    }).join('');

    grid.onclick = (e) => {
      const card = e.target.closest('.competition-card');
      if (!card) return;

      const league = decodeURIComponent(card.dataset.league || '');
      if (!league) return;

      openCompetition(league);
    };

    grid.onkeydown = (e) => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const card = e.target.closest('.competition-card');
      if (!card) return;

      e.preventDefault();
      const league = decodeURIComponent(card.dataset.league || '');
      if (!league) return;

      openCompetition(league);
    };
  }

  function openCompetition(league) {
    state.selectedLeague = league;

    const competition = state.competitions.find(c => c.league === league);
    const matches = (competition?.matches || [])
      .filter(match => isCompetitionVisible(match.kickoff) && !shouldHideLeague(match.league))
      .sort((a, b) => {
        const ka = a.kickoff ? new Date(a.kickoff).getTime() : 0;
        const kb = b.kickoff ? new Date(b.kickoff).getTime() : 0;
        return ka - kb;
      });

    document.getElementById('competitionsWrap').classList.add('hidden');
    document.getElementById('gamesWrap').classList.remove('hidden');
    document.getElementById('backToCompetitionsBtn').classList.remove('hidden');

    document.getElementById('selectedCompetitionTitle').textContent = getLeagueDisplay(league);
    document.getElementById('selectedCompetitionCopy').textContent =
      `${matches.length} jogo(s) entre hoje e os próximos 5 dias nesta competição.`;

    const gamesGrid = document.getElementById('gamesGrid');

    if (!matches.length) {
      gamesGrid.innerHTML = `<div class="empty-state">Nenhum jogo encontrado.</div>`;
      return;
    }

    gamesGrid.innerHTML = matches.map(match => `
      <div class="game-card">
        <div class="game-main">
          <div class="teams-row compact">
            ${teamBadge(match, 'home')}
            <div class="game-match">${escapeHtml(match.home_team)} x ${escapeHtml(match.away_team)}</div>
            ${teamBadge(match, 'away')}
          </div>

          <div class="game-meta">
            <span>${escapeHtml(getLeagueBadge(match.league))} ${escapeHtml(getLeagueDisplay(match.league))}</span>
            <span>${escapeHtml(formatKickoff(match.kickoff))}</span>
          </div>

          <div class="ticket-helper" style="margin-top:8px;">
            Mercado principal: ${escapeHtml(getPrimaryPick(match))}
          </div>
        </div>

        <div>
          <button class="primary-button" data-analyze-id="${escapeHtml(match.id)}">
            Ver análise →
          </button>
        </div>
      </div>
    `).join('');

    gamesGrid.onclick = (e) => {
      const btn = e.target.closest('[data-analyze-id]');
      if (!btn) return;
      openAnalysis(btn.dataset.analyzeId);
    };
  }

  function backToCompetitions() {
    state.selectedLeague = null;
    document.getElementById('competitionsWrap').classList.remove('hidden');
    document.getElementById('gamesWrap').classList.add('hidden');
    document.getElementById('backToCompetitionsBtn').classList.add('hidden');
  }

// =========================================================
  // 📈 FORMA RECENTE
  // =========================================================
  function parseRecentRaw(match, side) {
    const keys = side === 'home'
      ? ['home_form', 'home_recent_scores', 'home_last5_scores', 'recent_home_scores', 'home_form_scores']
      : ['away_form', 'away_recent_scores', 'away_last5_scores', 'recent_away_scores', 'away_form_scores'];

    for (const key of keys) {
      const value = match?.[key];
      if (!value) continue;

      if (Array.isArray(value)) return value;

      if (typeof value === 'string') {
        const trimmed = value.trim();
        if (!trimmed) continue;

        try {
          const parsed = JSON.parse(trimmed);
          if (Array.isArray(parsed)) return parsed;
        } catch (_) {}

        if (trimmed.includes('|')) return trimmed.split('|').map(v => v.trim()).filter(Boolean);
        if (trimmed.includes(',')) return trimmed.split(',').map(v => v.trim()).filter(Boolean);
      }
    }

    return [];
  }

  function parseScore(scoreText) {
    if (!scoreText || typeof scoreText !== 'string') return null;

    const clean = scoreText.replace(/\s+/g, '');
    const parts = clean.split(/[-–xX:]/);

    if (parts.length !== 2) return null;

    const a = Number(parts[0]);
    const b = Number(parts[1]);

    if (Number.isNaN(a) || Number.isNaN(b)) return null;

    return { a, b, label: `${a}-${b}` };
  }

  function buildRecentForm(match, side) {
    const raw = parseRecentRaw(match, side);
    if (!raw.length) return [];

    return raw.slice(0, 5).map(item => {
      const parsed = parseScore(String(item));
      if (!parsed) return { label: String(item), result: 'neutral' };

      return {
        label: parsed.label,
        result:
          parsed.a > parsed.b ? 'win' :
          parsed.a < parsed.b ? 'loss' :
          'draw'
      };
    });
  }

  function recentFormMarkup(match) {
    const homeForm = buildRecentForm(match, 'home');
    const awayForm = buildRecentForm(match, 'away');

    if (!homeForm.length && !awayForm.length) {
      return `<div class="empty-state">Sem histórico recente disponível para este jogo.</div>`;
    }

    function renderTeamForm(teamName, entries) {
      if (!entries.length) {
        return `
          <div class="form-team">
            <div class="form-team-name">${escapeHtml(teamName || 'Time')}</div>
            <div class="empty-state" style="padding:12px;">Sem dados recentes.</div>
          </div>
        `;
      }

      return `
        <div class="form-team">
          <div class="form-team-name">${escapeHtml(teamName || 'Time')}</div>
          <div class="form-boxes">
            ${entries.map(entry => `
              <div class="form-box ${
                entry.result === 'win' ? 'form-win' :
                entry.result === 'draw' ? 'form-draw' :
                entry.result === 'loss' ? 'form-loss' :
                'form-neutral'
              }">${escapeHtml(entry.label)}</div>
            `).join('')}
          </div>
        </div>
      `;
    }

    return `
      ${renderTeamForm(match.home_team, homeForm)}
      ${renderTeamForm(match.away_team, awayForm)}
    `;
  }

  // =========================================================
  // 🎯 MERCADOS DETECTADOS
  // =========================================================
  function getDetectedMarkets(match) {
    const seen = new Set();
    const list = [];

    function pushMarket(name, probability = null) {
      const clean = String(name || '').trim();
      if (!clean) return;
      if (seen.has(clean.toLowerCase())) return;
      seen.add(clean.toLowerCase());

      const prob = probability !== null ? probability : getMatchProbability(match);
      list.push({
        market: clean,
        tier: probabilityToTier(prob),
        probability: prob
      });
    }

    pushMarket(match.best_pick_1, getMatchProbability(match));
    pushMarket(match.best_pick_2, Math.max(getMatchProbability(match) - 0.02, 0.5));
    pushMarket(match.best_pick_3, Math.max(getMatchProbability(match) - 0.04, 0.5));
    pushMarket(match.safe_pick, Math.max(getMatchProbability(match) - 0.01, 0.5));
    pushMarket(match.balanced_pick, Math.max(getMatchProbability(match) - 0.03, 0.5));
    pushMarket(match.aggressive_pick, Math.max(getMatchProbability(match) - 0.06, 0.5));
    pushMarket(match.value_pick, Math.max(getMatchProbability(match) - 0.07, 0.5));
    pushMarket(match.pick, getMatchProbability(match));

    getDailyPicksForMatch(match.id).forEach((pick, index) => {
      pushMarket(
        pick.market,
        Math.max(Number(pick.probability || getMatchProbability(match)) - (index * 0.01), 0.5)
      );
    });

    return list.slice(0, 4);
  }

  // =========================================================
  // 🪟 MODAL DE ANÁLISE
  // =========================================================
  function openAnalysis(matchId) {
    const match = getMatchById(matchId);
    if (!match) return;

    const primaryPick = getPrimaryPick(match);
    const primaryTier = getMatchTier(match);
    const detectedMarkets = getDetectedMarkets(match);

    document.getElementById('analysisTitle').textContent =
      `${match.home_team || '-'} x ${match.away_team || '-'}`;

    document.getElementById('analysisSubtitle').textContent =
      `${getLeagueBadge(match.league)} ${getLeagueDisplay(match.league)} • ${formatKickoff(match.kickoff)}`;

    document.getElementById('analysisMatchSmall').innerHTML = `
      <div class="teams-row compact" style="margin-bottom:0;">
        ${teamBadge(match, 'home')}
        <div class="team-names">${escapeHtml(match.home_team || '-')} x ${escapeHtml(match.away_team || '-')}</div>
        ${teamBadge(match, 'away')}
      </div>
    `;

    document.getElementById('analysisTipChip').innerHTML = chipMarkup(primaryTier);
    document.getElementById('analysisBestPick').textContent = primaryPick;
    document.getElementById('analysisInsight').textContent = getInsight(match);
    document.getElementById('analysisStats').innerHTML = statCardsMarkup(match);
    document.getElementById('recentFormWrap').innerHTML = recentFormMarkup(match);

    document.getElementById('marketsList').innerHTML = detectedMarkets.length
      ? detectedMarkets.map(item => `
          <div class="market-line">
            <div class="chip-row" style="margin-top:0; margin-bottom:10px;">
              ${chipMarkup(item.tier)}
            </div>
            <div class="market-line-name">${escapeHtml(item.market)}</div>
          </div>
        `).join('')
      : `<div class="empty-state">Nenhuma oportunidade extra encontrada para este jogo.</div>`;

    document.getElementById('analysisOverlay').classList.add('open');
  }

  function closeAnalysis() {
    document.getElementById('analysisOverlay').classList.remove('open');
  }

  // =========================================================
  // ❌ ERRO DE LOAD
  // =========================================================
  function renderLoadError(errorMap = {}) {
    const parts = Object.entries(errorMap).map(([k, v]) => `${k}: ${v}`);
    const message = parts.join('\n') || 'Erro desconhecido';

    setStatus('Erro ao carregar dados do Scoutly.', false);

    document.getElementById('radarList').innerHTML =
      `<div class="error-state">${escapeHtml(message)}</div>`;

    document.getElementById('competitionsGrid').innerHTML =
      `<div class="error-state">${escapeHtml(message)}</div>`;

    document.getElementById('ticketContainer').innerHTML =
      `<div class="error-state">${escapeHtml(message)}</div>`;
  }

  // =========================================================
  // 📦 LOAD DAILY PICKS
  // =========================================================
  async function loadDailyPicks() {
    const { data, error } = await supabaseClient
      .from('daily_picks')
      .select('*')
      .order('rank', { ascending: true });

    if (error) throw error;
    state.dailyPicks = data || [];
  }

  // =========================================================
  // 📦 LOAD MATCHES + MATCH_ANALYSIS + MATCH_STATS
  // =========================================================
  async function loadMatches() {
    const { data: matchesData, error: matchesError } = await supabaseClient
      .from('matches')
      .select('*')
      .order('priority', { ascending: false })
      .order('kickoff', { ascending: true });

    if (matchesError) throw matchesError;

    let analysisData = [];
    let statsData = [];

    try {
      const { data, error } = await supabaseClient
        .from('match_analysis')
        .select('*');

      if (!error) analysisData = data || [];
    } catch (_) {}

    try {
      const { data, error } = await supabaseClient
        .from('match_stats')
        .select('*');

      if (!error) statsData = data || [];
    } catch (_) {}

    const analysisMap = new Map(
      (analysisData || []).map(item => [String(item.match_id), item])
    );

    const statsMap = new Map(
      (statsData || []).map(item => [String(item.match_id), item])
    );

    state.matches = (matchesData || [])
      .map(match => {
        const analysis = analysisMap.get(String(match.id)) || {};
        const stats = statsMap.get(String(match.id)) || {};

        return {
          ...match,
          ...analysis,
          ...stats,
          id: match.id,
          home_team: match.home_team,
          away_team: match.away_team,
          league: match.league,
          country: match.country,
          kickoff: match.kickoff,
          home_logo: match.home_logo,
          away_logo: match.away_logo
        };
      })
      .filter(match => {
        if (!match.home_team || !match.away_team) return false;
        if (!match.league) return false;
        if (shouldHideLeague(match.league)) return false;
        return true;
      });

    console.log('MATCHES CARREGADOS:', state.matches.length);
    console.log('MATCH ANALYSIS CARREGADOS:', analysisData.length);
    console.log('MATCH STATS CARREGADOS:', statsData.length);
    console.log('DAILY PICKS CARREGADOS:', state.dailyPicks.length);

    window.debugMatches = state.matches;
  }

  // =========================================================
  // 🎟️ GERAR NOVO BILHETE
  // =========================================================
  function generateNewTicket() {
    renderTicket();
  }

  // =========================================================
  // 🚀 INIT
  // =========================================================
  async function initialize() {
    const errors = {};
    setStatus('Conectando ao Scoutly...', true);

    try {
      await loadDailyPicks();
    } catch (error) {
      console.error('daily_picks error:', error);
      errors.daily_picks = error.message || JSON.stringify(error);
    }

    try {
      await loadMatches();
    } catch (error) {
      console.error('matches error:', error);
      errors.matches = error.message || JSON.stringify(error);
    }

    if (Object.keys(errors).length) {
      renderLoadError(errors);
      return;
    }

    renderTicket();
    renderRadar();
    renderCompetitions();

    setStatus(`Conexão OK · Matches carregados: ${state.matches.length}`, true);

    const generateBtn = document.getElementById('generateTicketBtn');
    if (generateBtn) {
      generateBtn.addEventListener('click', generateNewTicket);
    }

    document.getElementById('backToCompetitionsBtn').addEventListener('click', backToCompetitions);
    document.getElementById('closeAnalysisBtn').addEventListener('click', closeAnalysis);

    const overlay = document.getElementById('analysisOverlay');
    if (overlay) {
      overlay.addEventListener('click', (e) => {
        if (e.target.id === 'analysisOverlay') closeAnalysis();
      });
    }
  }

  initialize();
</script>
