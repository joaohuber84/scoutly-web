<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Scoutly</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
color:#22c55e;
text-align:center;
margin-bottom:40px;
}

.match{
background:#111827;
border-radius:10px;
padding:20px;
margin-bottom:20px;
}

.teams{
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
}

.team{
display:flex;
align-items:center;
gap:8px;
}

.logo{
width:28px;
height:28px;
background:white;
border-radius:50%;
padding:2px;
}

.vs{
color:#22c55e;
}

.meta{
margin-top:10px;
font-size:14px;
color:#cbd5e1;
}

.stats{
display:flex;
gap:10px;
margin-top:15px;
}

.stat{
flex:1;
background:#0b1220;
padding:10px;
border-radius:8px;
text-align:center;
}

.stat-title{
font-size:12px;
color:#94a3b8;
}

.stat-value{
font-size:22px;
font-weight:bold;
}

.power{
display:flex;
justify-content:space-between;
margin-top:15px;
background:#0b1220;
padding:10px;
border-radius:8px;
}

.power span{
font-weight:bold;
}

.form-section{
display:flex;
justify-content:space-between;
margin-top:15px;
}

.form{
display:flex;
gap:5px;
}

.form span{
width:22px;
height:22px;
display:flex;
align-items:center;
justify-content:center;
border-radius:4px;
font-size:12px;
font-weight:bold;
}

.win{background:#22c55e}
.draw{background:#eab308;color:black}
.loss{background:#ef4444}

.insight{
margin-top:15px;
background:#0b1220;
border-left:4px solid #22c55e;
padding:10px;
border-radius:6px;
}

.market{
margin-top:15px;
}

.bar{
height:10px;
background:#1f2937;
border-radius:6px;
overflow:hidden;
margin-top:4px;
}

.fill{
height:100%;
background:#22c55e;
}

.pick{
margin-top:15px;
border-left:4px solid #22c55e;
background:#0b1220;
padding:10px;
border-radius:6px;
}

.result-prob{
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<h1>Scoutly ⚽</h1>

<div id="matches">
Carregando jogos...
</div>

</div>

<script>

const SUPABASE_URL = "https://zngdcatlxlxamceqpxij.supabase.co"
const SUPABASE_KEY = "sb_publishable_gw3BGCEcwhidS2hFbiwxIA_W28KkZ2a"

const client = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

function renderForm(form){

if(!form) return ""

return form.split("").map(l=>{

if(l=="W") return `<span class="win">W</span>`
if(l=="D") return `<span class="draw">D</span>`
if(l=="L") return `<span class="loss">L</span>`

}).join("")

}

async function loadMatches(){

const container = document.getElementById("matches")

const {data,error} = await client
.from("matches")
.select("*")
.order("match_date",{ascending:true})

if(error){

container.innerHTML="Erro ao carregar"

return

}

let html=""

data.forEach(m=>{

html+=`

<div class="match">

<div class="teams">

<div class="team">
<img class="logo" src="${m.home_logo}">
${m.home_team}
</div>

<div class="vs">x</div>

<div class="team">
${m.away_team}
<img class="logo" src="${m.away_logo}">
</div>

</div>

<div class="meta">

Liga: ${m.league}<br>
Data: ${new Date(m.match_date).toLocaleDateString("pt-BR")}

</div>

<div class="stats">

<div class="stat">
<div class="stat-title">Média gols</div>
<div class="stat-value">${m.avg_goals}</div>
</div>

<div class="stat">
<div class="stat-title">Escanteios</div>
<div class="stat-value">${m.avg_corners}</div>
</div>

<div class="stat">
<div class="stat-title">Chutes</div>
<div class="stat-value">${m.avg_shots}</div>
</div>

</div>

<div class="power">

<div>
Power ${m.home_team}: <span>${m.power_home}</span>
</div>

<div>
Power ${m.away_team}: <span>${m.power_away}</span>
</div>

</div>

<div class="form-section">

<div>

${m.home_team} Forma

<div class="form">

${renderForm(m.home_form)}

</div>

</div>

<div>

${m.away_team} Forma

<div class="form">

${renderForm(m.away_form)}

</div>

</div>

</div>

<div class="insight">

<strong>Scoutly Insight</strong><br>
${m.insight}

</div>

<div class="market">

Over 2.5 ${m.over25_prob}%

<div class="bar">
<div class="fill" style="width:${m.over25_prob}%"></div>
</div>

BTTS ${m.btts_prob}%

<div class="bar">
<div class="fill" style="width:${m.btts_prob}%"></div>
</div>

Over 8.5 Cantos ${m.corners_over85_prob}%

<div class="bar">
<div class="fill" style="width:${m.corners_over85_prob}%"></div>
</div>

</div>

<div class="result-prob">

Vitória ${m.home_team}: ${m.home_result_prob}%<br>
Empate: ${m.draw_result_prob}%<br>
Vitória ${m.away_team}: ${m.away_result_prob}%

</div>

<div class="pick">

<strong>Scoutly Pick</strong><br>
${m.pick}

</div>

</div>

`

})

container.innerHTML=html

}

loadMatches()

</script>

</body>
</html>
