<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scoutly</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      color: #22c55e;
      margin: 0 0 24px 0;
      font-size: 32px;
      text-align: center;
    }

    .game {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    .teams {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
    }

    .team {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .team.home {
      justify-content: flex-start;
    }

    .team.away {
      justify-content: flex-end;
      text-align: right;
    }

    .team-name {
      font-size: 18px;
      font-weight: bold;
      line-height: 1.2;
    }

    .logo {
      width: 34px;
      height: 34px;
      object-fit: contain;
      background: white;
      border-radius: 50%;
      padding: 2px;
    }

    .vs {
      font-size: 18px;
      font-weight: bold;
      color: #22c55e;
      text-align: center;
    }

    .meta {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #1f2937;
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.6;
      text-align: center;
    }

    .label {
      color: #22c55e;
      font-weight: bold;
    }

    .stats {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #1f2937;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      text-align: center;
    }

    .stat-box {
      background: #0b1220;
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 10px 8px;
    }

    .stat-title {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: bold;
      color: #ffffff;
    }

    .insight {
      margin-top: 14px;
      background: #0b1220;
      border: 1px solid #1e293b;
      border-left: 4px solid #22c55e;
      border-radius: 10px;
      padding: 12px;
    }

    .insight-title {
      font-size: 13px;
      color: #22c55e;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .insight-text {
      font-size: 14px;
      color: #e2e8f0;
    }

    .loading {
      text-align: center;
      color: #cbd5e1;
      font-size: 16px;
    }

    .error {
      text-align: center;
      color: #f87171;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Scoutly ⚽</h1>
    <div id="games" class="loading">Carregando jogos...</div>
  </div>

  <script>
    const SUPABASE_URL = "https://zngdcatlxlxamceqpxij.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_gw3BGCEcwhidS2hFbiwxIA_W28KkZ2a";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadGames() {
      const el = document.getElementById("games");
      el.innerHTML = "Carregando jogos...";
      el.className = "loading";

      const { data, error } = await client
        .from("matches")
        .select("*")
        .order("match_date", { ascending: true });

      if (error) {
        console.log("ERRO:", error);
        el.className = "error";
        el.innerHTML = "Erro ao carregar jogos";
        return;
      }

      if (!data || data.length === 0) {
        el.className = "loading";
        el.innerHTML = "Nenhum jogo encontrado.";
        return;
      }

      const gamesHTML = data.map(game => `
        <div class="game">
          <div class="teams">
            <div class="team home">
              <img class="logo" src="${game.home_logo || ""}" onerror="this.style.display='none'">
              <div class="team-name">${game.home_team || ""}</div>
            </div>

            <div class="vs">x</div>

            <div class="team away">
              <div class="team-name">${game.away_team || ""}</div>
              <img class="logo" src="${game.away_logo || ""}" onerror="this.style.display='none'">
            </div>
          </div>

          <div class="meta">
            <span class="label">Liga:</span> ${game.league || "Não definida"}<br>
            <span class="label">Data:</span> ${game.match_date ? new Date(game.match_date).toLocaleDateString("pt-BR") : "Sem data"}
          </div>

          <div class="stats">
            <div class="stat-box">
              <div class="stat-title">Média de gols</div>
              <div class="stat-value">${game.avg_goals ?? "-"}</div>
            </div>

            <div class="stat-box">
              <div class="stat-title">Média de escanteios</div>
              <div class="stat-value">${game.avg_corners ?? "-"}</div>
            </div>

            <div class="stat-box">
              <div class="stat-title">Média de chutes</div>
              <div class="stat-value">${game.avg_shots ?? "-"}</div>
            </div>
          </div>

          <div class="insight">
            <div class="insight-title">Scoutly Insight</div>
            <div class="insight-text">${game.insight || "Sem insight por enquanto"}</div>
          </div>
        </div>
      `).join("");

      el.className = "";
      el.innerHTML = gamesHTML;
    }

    loadGames();
  </script>
</body>
</html>
