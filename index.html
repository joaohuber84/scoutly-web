<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #07111f;
      --card: rgba(14, 26, 48, 0.92);
      --card-2: rgba(20, 37, 67, 0.96);
      --border: rgba(112, 154, 255, 0.18);
      --text: #eef4ff;
      --muted: #9ab0d3;
      --green: #00ff88;
      --amber: #f0d36b;
      --blue: #74a7ff;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --max-width: 1200px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(0,255,136,0.06), transparent 28%),
        radial-gradient(circle at top right, rgba(105,167,255,0.10), transparent 26%),
        linear-gradient(180deg, #06101d 0%, #0a1425 35%, #0e1a31 100%);
    }

    .container {
      max-width: var(--max-width);
      margin: auto;
      padding: 20px;
    }

    h1, h2, h3 {
      margin: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 50px;
      height: 50px;
      border-radius: 14px;
    }

    .status-chip {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }

    .panel {
      background: var(--card);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      padding: 16px;
      margin-bottom: 20px;
    }

    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
    }

    .chip-very-strong { background: rgba(0,255,136,0.15); }
    .chip-good { background: rgba(46,220,146,0.15); }
    .chip-moderate { background: rgba(255,214,102,0.15); }
    .chip-extra { background: rgba(116,167,255,0.15); }

    .ticket-leg {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .teams {
      font-weight: 800;
      font-size: 14px;
    }

    .market {
      font-weight: 900;
      margin-top: 6px;
    }

    .radar-item {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .analysis-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .analysis-card {
      background: var(--card);
      padding: 20px;
      border-radius: 20px;
      max-width: 800px;
      width: 100%;
    }
  </style>
</head>

<body>

    <div class="topbar">

        <img src="logo-scoutly.jpg" class="brand-logo" />
        <div>

          <div style="font-size:12px;color:var(--muted)">
            Radar inteligente de oportunidades
          </div>
        </div>
      </div>

      <div class="status-chip" id="statusText">
        Conectando...
      </div>
    </div>

    <div class="panel">
      <h2>Bilhete do dia</h2>
      <div id="ticketContainer">Carregando...</div>
    </div>

    <div class="panel">
      <h2>Radar</h2>
      <div id="radarList">Carregando...</div>
    </div>

    <div class="panel">
      <h2>Competições</h2>
      <div id="competitionsGrid">Carregando...</div>
    </div>

  </div>

  <div class="analysis-overlay" id="analysisOverlay">
    <div class="analysis-card" id="analysisContent"></div>

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setStatus(text, ok = true) {
      const statusEl = document.getElementById("statusText");
      if (!statusEl) return;
      statusEl.textContent = text;
      statusEl.style.color = ok ? "var(--muted)" : "#ffb4b4";
    }

    function toNumber(value, fallback = null) {
      const num = Number(value);
      return Number.isFinite(num) ? num : fallback;
    }

    function clamp(value, min = 0, max = 1) {
      return Math.max(min, Math.min(max, value));
    }

    function maybeJson(value) {
      if (!value) return null;
      if (typeof value === "object") return value;
      if (typeof value === "string") {
        try {
          return JSON.parse(value);
        } catch (_) {
          return null;
        }
      }
      return null;
    }

    function parseDateSafe(value) {
      if (!value) return null;
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function startOfDay(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function endOfDay(date) {
      const d = new Date(date);
      d.setHours(23, 59, 59, 999);
      return d;
    }

    function normalizeTeamName(name) {
      const raw = String(name || "").trim();
      return TEAM_NAME_MAP[raw] || raw || "-";
    }

    function getLeagueDisplay(league) {
      return LEAGUE_META[league]?.label || league || "-";
    }

    function getLeagueBadge(league) {
      return LEAGUE_META[league]?.badge || "LG";
    }

    function getLeagueSort(league) {
      return LEAGUE_META[league]?.sort || 999;
    }

    function formatKickoff(value) {
      const d = parseDateSafe(value);
      if (!d) return "Horário não disponível";

      return d.toLocaleString("pt-BR", {
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function formatKickoffHour(value) {
      const d = parseDateSafe(value);
      if (!d) return "--:--";

      return d.toLocaleTimeString("pt-BR", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function formatDayKey(value) {
      const d = parseDateSafe(value);
      if (!d) return "sem-data";

      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");

      return `${year}-${month}-${day}`;
    }

    function formatDayLabel(value) {
      const d = parseDateSafe(value);
      if (!d) return "Sem data";

      const today = startOfDay(new Date());
      const target = startOfDay(d);
      const diff = Math.round((target.getTime() - today.getTime()) / 86400000);

      if (diff === 0) return "Hoje";
      if (diff === 1) return "Amanhã";

      return d.toLocaleDateString("pt-BR", {
        weekday: "short",
        day: "2-digit",
        month: "2-digit"
      });
    }

    function formatDecimal(value, digits = 1, empty = "—") {
      const num = toNumber(value, null);
      if (num === null) return empty;
      return num.toFixed(digits);
    }

    function percentText(value, empty = "—") {
      const num = toNumber(value, null);
      if (num === null) return empty;
      const normalized = num > 1 ? num : num * 100;
      return `${Math.round(normalized)}%`;
    }

    function probabilityToTier(prob) {
      const p = Number(prob || 0);
      if (p >= 0.80) return "Muito forte";
      if (p >= 0.70) return "Boa";
      if (p >= 0.60) return "Moderada";
      return "Extra";
    }

    function chipClass(tier) {
      if (tier === "Muito forte") return "chip chip-very-strong";
      if (tier === "Boa") return "chip chip-good";
      if (tier === "Moderada") return "chip chip-moderate";
      return "chip chip-extra";
    }

    function chipMarkup(tier) {
      return `<span class="${chipClass(tier)}">${escapeHtml(tier)}</span>`;
    }

    function teamInitials(name) {
      const normalized = normalizeTeamName(name);
      if (!normalized) return "TM";

      return normalized
        .trim()
        .split(/\s+/)
        .slice(0, 2)
        .map(word => word[0]?.toUpperCase() || "")
        .join("") || "TM";
    }

    function teamLogoUrl(match, side) {
      const keys = side === "home"
        ? ["home_logo", "home_logo_url", "home_badge", "home_badge_url"]
        : ["away_logo", "away_logo_url", "away_badge", "away_badge_url"];

      for (const key of keys) {
        const value = match?.[key];
        if (typeof value === "string" && value.trim()) return value.trim();
      }

      return "";
    }

    function teamBadge(match, side) {
      const teamName = normalizeTeamName(side === "home" ? match?.home_team : match?.away_team);
      const logo = teamLogoUrl(match, side);

      if (logo) {
        return `
          <div class="team-badge">
            <img
              src="${escapeHtml(logo)}"
              alt="${escapeHtml(teamName)}"
              onerror="this.style.display='none'; this.parentNode.textContent='${escapeHtml(teamInitials(teamName))}';"
            />
          </div>
        `;
      }

      return `<div class="team-badge">${escapeHtml(teamInitials(teamName))}</div>`;
    }

    function marketFamily(market) {
      const m = String(market || "").trim().toLowerCase();

      if (!m) return "outro";
      if (m.includes("escanteio")) return "escanteios";
      if (m.includes("ambas")) return "btts";
      if (
        m.includes("dupla chance") ||
        m.includes("empate") ||
        m.includes("vitória") ||
        m.includes("vitoria")
      ) return "resultado";
      if (m.includes("gol")) return "gols";

      return "outro";
    }

    function marketPriority(family) {
      const order = {
        gols: 1,
        btts: 2,
        resultado: 3,
        escanteios: 4,
        outro: 5
      };

      return order[family] || 99;
    }

    function marketNormalizedKey(market) {
      return String(market || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function shouldHideLeague(leagueName) {
      const name = String(leagueName || "").toLowerCase();

      return (
        name.includes("u17") ||
        name.includes("u18") ||
        name.includes("u19") ||
        name.includes("u20") ||
        name.includes("u21") ||
        name.includes("u23") ||
        name.includes("under 17") ||
        name.includes("under 18") ||
        name.includes("under 19") ||
        name.includes("under 20") ||
        name.includes("under 21") ||
        name.includes("under 23") ||
        name.includes("sub 17") ||
        name.includes("sub 18") ||
        name.includes("sub 19") ||
        name.includes("sub 20") ||
        name.includes("sub 21") ||
        name.includes("sub 23") ||
        name.includes("reserve") ||
        name.includes("reserves") ||
        name.includes("open cup")
      );
    }

    function isStillRelevantForRadar(value) {
      const d = parseDateSafe(value);
      if (!d) return false;

      const now = new Date();
      const endWindow = new Date(d.getTime() + MATCH_END_GRACE_MINUTES * 60000);
      const lookAhead = new Date(now.getTime() + RADAR_LOOKAHEAD_HOURS * 60 * 60 * 1000);

      return endWindow > now && d <= lookAhead;
    }

    function isStillRelevantForTicket(value) {
      return isStillRelevantForRadar(value);
    }

    function isCompetitionVisible(value) {
      const d = parseDateSafe(value);
      if (!d) return false;

      const now = new Date();
      const start = startOfDay(now);
      const end = endOfDay(new Date(now.getTime() + 5 * 24 * 60 * 60 * 1000));

      return d >= start && d <= end;
    }

    function getMatchById(id) {
      return state.matches.find(match => String(match.id) === String(id)) || null;
    }

    function getRadarEligibleMatches() {
      return state.matches.filter(match =>
        isStillRelevantForRadar(match.kickoff) &&
        !shouldHideLeague(match.league)
      );
    }

    function getPrimaryPick(match) {
      return (
        match.best_pick_1 ||
        match.pick ||
        match.safe_pick ||
        match.balanced_pick ||
        match.aggressive_pick ||
        match.value_pick ||
        "Mercado em revisão"
      );
    }

    function getMatchProbability(match) {
      const direct =
        toNumber(match.probability, null) ??
        toNumber(match.main_probability, null) ??
        toNumber(match.confidence_score, null);

      if (direct !== null) {
        return direct > 1 ? clamp(direct / 100, 0, 1) : clamp(direct, 0, 1);
      }

      const probabilities = maybeJson(match.probabilities) || {};
      const home = toNumber(probabilities.home, null);
      const draw = toNumber(probabilities.draw, null);
      const away = toNumber(probabilities.away, null);

      const max1x2 = [home, draw, away]
        .filter(v => v !== null)
        .sort((a, b) => b - a)[0];

      if (max1x2 !== undefined) return clamp(max1x2, 0, 1);

      return 0.62;
    }

    function getMatchTier(match) {
      return probabilityToTier(getMatchProbability(match));
    }

    function getMetrics(match) {
      const metrics = maybeJson(match.metrics) || {};
      const markets = maybeJson(match.markets) || {};
      const probabilities = maybeJson(match.probabilities) || {};

      const expectedHomeGoals = toNumber(match.expected_home_goals, null);
      const expectedAwayGoals = toNumber(match.expected_away_goals, null);
      const expectedHomeShots = toNumber(match.expected_home_shots, null);
      const expectedAwayShots = toNumber(match.expected_away_shots, null);
      const expectedHomeSOT = toNumber(match.expected_home_sot, null);
      const expectedAwaySOT = toNumber(match.expected_away_sot, null);
      const expectedCorners = toNumber(match.expected_corners, null);
      const expectedCards = toNumber(match.expected_cards, null);

      return {
        avgGoals:
          (expectedHomeGoals !== null || expectedAwayGoals !== null)
            ? (expectedHomeGoals || 0) + (expectedAwayGoals || 0)
            : (
                toNumber(metrics.goals, null) ??
                toNumber(markets.goals, null) ??
                toNumber(match.avg_goals, null)
              ),

        avgCorners:
          expectedCorners ??
          toNumber(metrics.corners, null) ??
          toNumber(markets.corners, null) ??
          toNumber(match.avg_corners, null),

        avgShots:
          (expectedHomeShots !== null || expectedAwayShots !== null)
            ? (expectedHomeShots || 0) + (expectedAwayShots || 0)
            : (
                toNumber(metrics.shots, null) ??
                toNumber(markets.shots, null) ??
                toNumber(match.avg_shots, null)
              ),

        avgShotsOnTarget:
          (expectedHomeSOT !== null || expectedAwaySOT !== null)
            ? (expectedHomeSOT || 0) + (expectedAwaySOT || 0)
            : (
                toNumber(metrics.shots_on_target, null) ??
                toNumber(metrics.sot, null) ??
                toNumber(markets.shots_on_target, null) ??
                toNumber(match.avg_shots_on_target, null)
              ),

        avgCards:
          expectedCards ??
          toNumber(metrics.cards, null) ??
          toNumber(markets.cards, null) ??
          toNumber(match.avg_cards, null),

        avgFouls:
          toNumber(metrics.fouls, null) ??
          toNumber(markets.fouls, null) ??
          toNumber(match.avg_fouls, null),

        homeStrength: toNumber(match.home_strength, null),
        awayStrength: toNumber(match.away_strength, null),
        homeProb: toNumber(probabilities.home, null),
        drawProb: toNumber(probabilities.draw, null),
        awayProb: toNumber(probabilities.away, null),
        probOver25: toNumber(match.prob_over25, null),
        probBTTS: toNumber(match.prob_btts, null),
        probCorners: toNumber(match.prob_corners, null)
      };
    }

    function buildFallbackInsight(match) {
      const primary = getPrimaryPick(match).toLowerCase();
      const { avgGoals, avgCorners, avgShots } = getMetrics(match);

      if (primary.includes("escanteios")) {
        return `A leitura do Scoutly aponta volume estatístico suficiente para sustentar esse mercado, com cerca de ${formatDecimal(avgCorners, 1)} escanteios projetados para a partida.`;
      }

      if (primary.includes("menos")) {
        return `O Scoutly enxerga um confronto mais controlado, com menor tendência de explosão ofensiva. A projeção atual gira em torno de ${formatDecimal(avgGoals, 1)} gols para o jogo.`;
      }

      if (primary.includes("mais")) {
        return `A leitura do Scoutly aponta produção ofensiva suficiente para sustentar esse mercado, com cerca de ${formatDecimal(avgGoals, 1)} gols esperados e ${formatDecimal(avgShots, 0)} finalizações projetadas.`;
      }

      if (primary.includes("dupla chance") || primary.includes("empate")) {
        return "O Scoutly vê equilíbrio no confronto, mas com leve vantagem estatística para o lado recomendado. Por isso, a leitura mais segura fica na linha protegida.";
      }

      return "Leitura construída a partir dos dados reais do confronto, cruzando ritmo ofensivo, probabilidade e contexto estatístico para destacar a melhor oportunidade do jogo.";
    }

    function getInsight(match) {
      return match.analysis_text || match.insight || buildFallbackInsight(match);
    }

    async function loadDailyPicks() {
      const { data, error } = await supabaseClient
        .from("daily_picks")
        .select("*")
        .order("rank", { ascending: true });

      if (error) throw error;

    async function loadMatches() {
      const { data: matchesData, error: matchesError } = await supabaseClient
        .from("matches")
        .select("*")
        .order("priority", { ascending: false })
        .order("kickoff", { ascending: true });

      if (matchesError) throw matchesError;

      const { data: analysisData, error: analysisError } = await supabaseClient
        .from("match_analysis")
        .select("*");

      if (analysisError) throw analysisError;

      state.analysisMap = new Map(
        (analysisData || []).map(item => [String(item.match_id), item])
      );

      state.matches = (matchesData || [])
        .map(match => {
          const analysis = state.analysisMap.get(String(match.id)) || {};

          return {
            ...match,
            ...analysis,
            id: match.id,
            home_team: normalizeTeamName(match.home_team),
            away_team: normalizeTeamName(match.away_team)
          };
        })
        .filter(match => {
          if (!match.home_team || !match.away_team) return false;
          if (!match.league) return false;

          return true;
        });

      window.debugMatches = state.matches;
      window.debugDailyPicks = state.dailyPicks;

function buildGameProfile(match) {
      const m = getMetrics(match);

      const shots = Number(m.avgShots || 0);
      const sot = Number(m.avgShotsOnTarget || 0);
      const goals = Number(m.avgGoals || 0);
      const corners = Number(m.avgCorners || 0);

      const homeStrength = Number(m.homeStrength || 0);
      const awayStrength = Number(m.awayStrength || 0);

      const homeProb = Number(m.homeProb || 0);
      const awayProb = Number(m.awayProb || 0);

      const probBTTS = Number(m.probBTTS || 0);

      let style = "equilibrado";

      if (shots >= 22 && sot >= 8 && goals >= 2.5) {
        style = "aberto";
      } else if (shots < 18 && goals < 2.3) {
        style = "travado";
      }

      return {
        shots,
        sot,
        goals,
        corners,
        style,
        homeStrength,
        awayStrength,
        strengthGap: Math.abs(homeStrength - awayStrength),
        homeProb,
        awayProb,
        probBTTS
      };
    }

    function buildCandidates(match) {
      const profile = buildGameProfile(match);

      const raw = [
        match.best_pick_1,
        match.best_pick_2,
        match.best_pick_3,
        match.safe_pick,
        match.balanced_pick,
        match.aggressive_pick,
        match.value_pick,
        match.pick
      ].map(x => String(x || "").trim()).filter(Boolean);

      const seen = new Set();

      const unique = raw.filter(m => {
        const key = marketNormalizedKey(m);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });

      return unique.map(market => {
        const type = marketFamily(market);

        let score = getMatchProbability(match) * 100;

        // GOLS
        if (type === "gols") {
          if (profile.goals >= 2.6) score += 15;
          if (profile.shots >= 22) score += 10;
        }

        // ESCANTEIOS
        if (type === "escanteios") {
          if (profile.corners >= 9.5) score += 15;
          if (profile.shots >= 20) score += 8;
        }

        // BTTS
        if (type === "btts") {
          if (profile.probBTTS >= 0.55) score += 15;
          if (profile.goals >= 2.5) score += 8;
        }

        // RESULTADO
        if (type === "resultado") {
          if (profile.strengthGap >= 1.4) score += 12;
        }

        return {
          market,
          type,
          score
        };
      }).sort((a, b) => b.score - a.score);
    }

    function buildSmartPicks(match) {
      const candidates = buildCandidates(match);

      const selected = [];
      const usedTypes = new Set();

      for (const c of candidates) {
        if (usedTypes.has(c.type)) continue;

        selected.push(c);
        usedTypes.add(c.type);

        if (selected.length >= 3) break;
      }

      if (selected.length < 3) {
        for (const c of candidates) {
          if (selected.find(x => x.market === c.market)) continue;
          selected.push(c);
          if (selected.length >= 3) break;
        }
      }

      return selected.slice(0, 3);
    }

    function getPrimaryPick(match) {
      const smart = buildSmartPicks(match);
      return smart[0]?.market || "Mercado em revisão";
    }

    function getDetectedMarkets(match) {
      const smart = buildSmartPicks(match);

      const alt1 = smart[1];
      const alt2 = smart[2];

      const items = [];

      if (alt1) {
        items.push({
          label: "Boa opção",
          market: alt1.market,
          tier: "Boa"
        });
      }

      if (alt2) {
        items.push({
          label: "Mais arriscada",
          market: alt2.market,
          tier: "Moderada"
        });
      }

      return items;
    }

    function buildScoutlyInsight(match) {
      const p = buildGameProfile(match);

      let text = "";

      if (p.style === "aberto") {
        text += `Jogo aberto com ${formatDecimal(p.shots,0)} finalizações e ${formatDecimal(p.sot,0)} no alvo. `;
      } else if (p.style === "travado") {
        text += `Jogo mais travado com baixa produção ofensiva. `;
      } else {
        text += `Jogo equilibrado com leitura mais seletiva. `;
      }

      text += `Projeção de ${formatDecimal(p.goals,1)} gols e ${formatDecimal(p.corners,1)} escanteios. `;

      if (p.strengthGap >= 1.4) {
        text += `Existe vantagem clara de um dos lados.`;
      }

      return text;
    }

    function getInsight(match) {
      return buildScoutlyInsight(match);
    }

    function buildRadarSnapshot() {
      const matches = getRadarEligibleMatches();

      const sorted = matches
        .map(m => ({
          ...m,
          prob: getMatchProbability(m)
        }))
        .sort((a, b) => {
          const timeA = new Date(a.kickoff).getTime();
          const timeB = new Date(b.kickoff).getTime();

          if (timeA !== timeB) return timeA - timeB;

          return b.prob - a.prob;
        })
        .slice(0, RADAR_MAX_ITEMS);

      state.lastRadarSnapshot = sorted;

      return sorted;
    }

    function generateTicket() {
      const radar = buildRadarSnapshot();

      const shuffled = [...radar]
        .sort(() => Math.random() - 0.5)
        .slice(0, 8);

      const picks = [];
      const usedMatches = new Set();
      const usedFamilies = new Set();

      for (const match of shuffled) {
        const market = getPrimaryPick(match);
        const family = marketFamily(market);

        if (usedMatches.has(match.id)) continue;
        if (usedFamilies.has(family)) continue;

        picks.push({
          match_id: match.id,
          market,
          home_team: match.home_team,
          away_team: match.away_team,
          kickoff: match.kickoff,
          league: match.league,
          tier: getMatchTier(match)
        });

        usedMatches.add(match.id);
        usedFamilies.add(family);

        if (picks.length >= TICKET_SIZE) break;
      }

      state.currentTicket = picks;
      renderTicket();
    }

    function renderRadar() {
      const list = document.getElementById("radarList");
      if (!list) return;

      const radarItems = buildRadarSnapshot();

      if (!radarItems.length) {
        list.innerHTML = `<div class="empty-state">Nenhuma oportunidade ativa encontrada para agora.</div>`;
        return;
      }

      const groupsByDay = new Map();

        if (!groupsByDay.has(dayKey)) {

          });

        groupsByDay.get(dayKey).items.push({

        });
      });

      list.innerHTML = Array.from(groupsByDay.entries()).map(([dayKey, dayGroup]) => {
        const hourGroups = new Map();

        dayGroup.items.forEach(item => {

          <div class="radar-day-group" data-day="${escapeHtml(dayKey)}">

                    </div>

    function buildCompetitions() {
      const map = new Map();

      const visibleMatches = state.matches.filter(match =>
        isCompetitionVisible(match.kickoff) &&
        !shouldHideLeague(match.league)
      );

      for (const match of visibleMatches) {
        const league = match.league || "";
        const country = match.country || null;

        if (!map.has(league)) {
          map.set(league, {
            league,
            country,
            count: 0,
            matches: [],
            kickoff: match.kickoff
          });
        }

        const item = map.get(league);

        if (!item.country && country) item.country = country;
        if (!item.kickoff || new Date(match.kickoff) < new Date(item.kickoff)) {
          item.kickoff = match.kickoff;
        }

        item.count += 1;
        item.matches.push(match);
      }

      state.competitions = Array.from(map.values()).sort((a, b) => {
        const sortDiff = getLeagueSort(a.league) - getLeagueSort(b.league);
        if (sortDiff !== 0) return sortDiff;
        return new Date(a.kickoff).getTime() - new Date(b.kickoff).getTime();
      });
    }

    function renderCompetitions() {
      buildCompetitions();

      const grid = document.getElementById("competitionsGrid");
      if (!grid) return;

      if (!state.competitions.length) {
        grid.innerHTML = `<div class="empty-state">Nenhuma competição encontrada para os próximos jogos.</div>`;
        return;
      }

      grid.innerHTML = state.competitions.map(comp => {
        const flagCode = getFlag(comp.country);
        const flagMarkup = flagCode
          ? `<img src="https://flagcdn.com/w40/${flagCode.toLowerCase()}.png" width="28" alt="${escapeHtml(comp.country || "flag")}" />`
          : `<span>${escapeHtml(getLeagueBadge(comp.league))}</span>`;

        return `
          <div class="competition-card" data-league="${encodeURIComponent(comp.league)}" role="button" tabindex="0">
            <div class="competition-top">
              <div class="competition-flag">${flagMarkup}</div>
              <div class="competition-count">${comp.count} jogo(s)</div>
            </div>

            <div class="competition-name">${escapeHtml(getLeagueDisplay(comp.league))}</div>
            <div class="competition-bottom">Toque para ver os jogos desta competição.</div>
          </div>
        `;
      }).join("");

      grid.onclick = e => {
        const card = e.target.closest(".competition-card");
        if (!card) return;

        const league = decodeURIComponent(card.dataset.league || "");
        if (!league) return;
        openCompetition(league);
      };

      grid.onkeydown = e => {
        if (e.key !== "Enter" && e.key !== " ") return;

        const card = e.target.closest(".competition-card");
        if (!card) return;

        e.preventDefault();
        const league = decodeURIComponent(card.dataset.league || "");
        if (!league) return;
        openCompetition(league);
      };
    }

    function openCompetition(league) {
      state.selectedLeague = league;

      const competition = state.competitions.find(c => c.league === league);
      const matches = (competition?.matches || [])
        .filter(match => isCompetitionVisible(match.kickoff) && !shouldHideLeague(match.league))
        .sort((a, b) => new Date(a.kickoff).getTime() - new Date(b.kickoff).getTime());

      document.getElementById("competitionsWrap")?.classList.add("hidden");
      document.getElementById("gamesWrap")?.classList.remove("hidden");
      document.getElementById("backToCompetitionsBtn")?.classList.remove("hidden");

      const selectedTitle = document.getElementById("selectedCompetitionTitle");
      const selectedCopy = document.getElementById("selectedCompetitionCopy");
      const gamesGrid = document.getElementById("gamesGrid");

      if (selectedTitle) selectedTitle.textContent = getLeagueDisplay(league);
      if (selectedCopy) {
        selectedCopy.textContent = `${matches.length} jogo(s) entre hoje e os próximos 5 dias nesta competição.`;
      }

      if (!gamesGrid) return;

      if (!matches.length) {
        gamesGrid.innerHTML = `<div class="empty-state">Nenhum jogo encontrado.</div>`;
        return;
      }

      gamesGrid.innerHTML = matches.map(match => `
        <div class="game-card">
          <div class="game-main">
            <div class="teams-row compact">
              ${teamBadge(match, "home")}
              <div class="game-match">${escapeHtml(normalizeTeamName(match.home_team))} x ${escapeHtml(normalizeTeamName(match.away_team))}</div>
              ${teamBadge(match, "away")}
            </div>

            <div class="game-meta">
              <span>${escapeHtml(getLeagueBadge(match.league))} ${escapeHtml(getLeagueDisplay(match.league))}</span>
              <span>${escapeHtml(formatKickoff(match.kickoff))}</span>
            </div>

            <div class="ticket-helper" style="margin-top:8px;">

            </div>
          </div>

          <div>
            <button class="primary-button" data-analyze-id="${escapeHtml(match.id)}">Ver análise →</button>
          </div>
        </div>
      `).join("");

      gamesGrid.onclick = e => {
        const btn = e.target.closest("[data-analyze-id]");
        if (!btn) return;
        openAnalysis(btn.dataset.analyzeId);
      };
    }

    function backToCompetitions() {

      document.getElementById("gamesWrap")?.classList.add("hidden");
      document.getElementById("backToCompetitionsBtn")?.classList.add("hidden");

      if (!match) return;

      const primaryPick = getPrimaryPick(match);
      const primaryTier = getMatchTier(match);
      const detectedMarkets = getDetectedMarkets(match);

      const analysisTitle = document.getElementById("analysisTitle");
      const analysisSubtitle = document.getElementById("analysisSubtitle");
      const analysisMatchSmall = document.getElementById("analysisMatchSmall");
      const analysisTipChip = document.getElementById("analysisTipChip");
      const analysisBestPick = document.getElementById("analysisBestPick");
      const analysisInsight = document.getElementById("analysisInsight");
      const analysisStats = document.getElementById("analysisStats");
      const analysisContext = document.getElementById("analysisContext");
      const marketsList = document.getElementById("marketsList");
      const overlay = document.getElementById("analysisOverlay");

      if (analysisTitle) {
        analysisTitle.textContent = `${normalizeTeamName(match.home_team)} x ${normalizeTeamName(match.away_team)}`;
      }

      if (analysisSubtitle) {
        analysisSubtitle.textContent = `${getLeagueBadge(match.league)} ${getLeagueDisplay(match.league)} • ${formatKickoff(match.kickoff)}`;
      }

      if (analysisMatchSmall) {
        analysisMatchSmall.innerHTML = `
          <div class="teams-row compact" style="margin-bottom:0;">
            ${teamBadge(match, "home")}
            <div class="team-names">${escapeHtml(normalizeTeamName(match.home_team))} x ${escapeHtml(normalizeTeamName(match.away_team))}</div>
            ${teamBadge(match, "away")}

        `;

        analysisTipChip.innerHTML = `
          ${chipMarkup(primaryTier)}

      if (analysisStats) analysisStats.innerHTML = statCardsMarkup(match);
      if (analysisContext) analysisContext.innerHTML = contextCardsMarkup(match);

              <div class="market-line">

                  ${chipMarkup(item.tier)}

    function refreshUIOnly() {
      renderRadar();
      renderCompetitions();
      generateTicket();

      if (state.selectedLeague) {
        openCompetition(state.selectedLeague);
      }

      const openOverlay = document.getElementById("analysisOverlay");
      if (openOverlay?.classList.contains("open") && state.lastOpenedMatchId) {
        openAnalysis(state.lastOpenedMatchId);

    async function refreshAllData(silent = false) {
      const errors = {};

      if (!silent) setStatus("Atualizando Scoutly...", true);

      try {
        await loadDailyPicks();
      } catch (error) {
        errors.daily_picks = error.message || JSON.stringify(error);
      }

      try {
        await loadMatches();
      } catch (error) {
        errors.matches = error.message || JSON.stringify(error);
      }

      if (Object.keys(errors).length) {
        renderLoadError(errors);
        return false;
      }

      refreshUIOnly();
      setStatus(`Conexão OK · Matches carregados: ${state.matches.length}`, true);
      return true;
    }

    function startAutoRefresh() {
      if (state.refreshTimer) clearInterval(state.refreshTimer);
      if (state.dataRefreshTimer) clearInterval(state.dataRefreshTimer);

      state.refreshTimer = setInterval(() => {
        refreshUIOnly();
      }, AUTO_UI_REFRESH_MS);

      state.dataRefreshTimer = setInterval(() => {
        refreshAllData(true);
      }, AUTO_DATA_REFRESH_MS);
    }

    function bindStaticEvents() {
      const generateBtn = document.getElementById("generateTicketBtn");
      if (generateBtn && !generateBtn.dataset.bound) {
        generateBtn.addEventListener("click", () => generateTicket());
        generateBtn.dataset.bound = "1";
      }

      const backBtn = document.getElementById("backToCompetitionsBtn");
      if (backBtn && !backBtn.dataset.bound) {
        backBtn.addEventListener("click", backToCompetitions);
        backBtn.dataset.bound = "1";
      }

      const closeBtn = document.getElementById("closeAnalysisBtn");
      if (closeBtn && !closeBtn.dataset.bound) {
        closeBtn.addEventListener("click", closeAnalysis);
        closeBtn.dataset.bound = "1";
      }

      const overlay = document.getElementById("analysisOverlay");
      if (overlay && !overlay.dataset.bound) {
        overlay.addEventListener("click", e => {
          if (e.target.id === "analysisOverlay") closeAnalysis();
        });
        overlay.dataset.bound = "1";
      }

      if (!document.body.dataset.scoutlyEscBound) {
        document.addEventListener("keydown", e => {
          if (e.key === "Escape") closeAnalysis();
        });
        document.body.dataset.scoutlyEscBound = "1";
      }
    }

    async function initialize() {
      bindStaticEvents();

      const ok = await refreshAllData(false);
      if (!ok) return;

      startAutoRefresh();
    }

    initialize();
  </script>
</body>
</html>
