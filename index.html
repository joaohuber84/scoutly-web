<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Scoutly</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
padding:30px;
}

h1{
color:#22c55e;
}

.match{
background:#111827;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.teams{
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
}

.logo{
width:28px;
height:28px;
margin-right:8px;
}

.team{
display:flex;
align-items:center;
}

.meta{
margin-top:6px;
opacity:.8;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:16px;
}

.stat{
text-align:center;
}

.prob{
margin-top:12px;
}

.bar{
background:#1f2937;
height:10px;
border-radius:6px;
overflow:hidden;
margin-top:4px;
}

.fill{
background:#22c55e;
height:100%;
}

.pick{
margin-top:14px;
color:#22c55e;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Scoutly ⚽</h1>

<div id="matches">
Carregando jogos...
</div>

<script>

const SUPABASE_URL = "COLE_AQUI_TUA_URL";
const SUPABASE_ANON_KEY = "COLE_AQUI_TUA_ANON_KEY";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadMatches(){

const { data, error } = await client
.from("matches")
.select("*")
.order("created_at", {ascending:false});

if(error){
console.log(error);
document.getElementById("matches").innerHTML = "Erro ao carregar dados";
return;
}

let html = "";

data.forEach(m => {

html += `

<div class="match">

<div class="teams">

<div class="team">
<img class="logo" src="${m.home_logo}">
${m.home_team}
</div>

<div>X</div>

<div class="team">
${m.away_team}
<img class="logo" src="${m.away_logo}">
</div>

</div>

<div class="meta">
Liga: ${m.league || "-"}<br>
Data: ${m.match_date || "-"}
</div>

<div class="stats">

<div class="stat">
<div>Média gols</div>
<strong>${m.avg_goals || "-"}</strong>
</div>

<div class="stat">
<div>Escanteios</div>
<strong>${m.avg_corners || "-"}</strong>
</div>

<div class="stat">
<div>Chutes</div>
<strong>${m.avg_shots || "-"}</strong>
</div>

</div>

<div class="prob">
Over 2.5 — ${m.over25_prob || 0}%
<div class="bar">
<div class="fill" style="width:${m.over25_prob || 0}%"></div>
</div>
</div>

<div class="prob">
BTTS — ${m.btts_prob || 0}%
<div class="bar">
<div class="fill" style="width:${m.btts_prob || 0}%"></div>
</div>
</div>

<div class="prob">
Over 8.5 Cantos — ${m.corners_over85_prob || 0}%
<div class="bar">
<div class="fill" style="width:${m.corners_over85_prob || 0}%"></div>
</div>
</div>

<div class="pick">
Scoutly Insight: ${m.pick || "-"}
</div>

</div>

`;

});

document.getElementById("matches").innerHTML = html;

}

loadMatches();

</script>

</body>
</html>
