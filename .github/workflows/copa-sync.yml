name: Copa Sync

on:
  schedule:
    - cron: '0 10 * * *'  # 07:00 BRT
    - cron: '0 22 * * *'  # 19:00 BRT
  workflow_dispatch:

jobs:
  copa-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install
      - name: Copa Sync
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/copa-sync.js
      - name: Árbitros Copa
        run: |
          curl -s --max-time 60 "https://zngdcatlxlxamceqpxij.supabase.co/functions/v1/populate-referees" || true
