name: Scoutly Pipeline (Sync + Brain)

on:
  schedule:
    # Roda a cada 2 horas, todos os dias — mantém os dados sempre frescos
    # sem precisar disparar manualmente. Horário em UTC.
    - cron: '0 */2 * * *'
  workflow_dispatch: {}   # permite rodar manualmente quando quiser, a qualquer momento

permissions:
  contents: read

jobs:
  sync:
    name: Scoutly Sync (coleta dados da API-Football)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install @supabase/supabase-js

      - name: Rodar Scoutly Sync
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scoutly-sync.js

  brain:
    name: Scoutly Brain (gera análises e radar)
    needs: sync   # só roda depois do sync terminar com sucesso
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install @supabase/supabase-js ws

      - name: Rodar Scoutly Brain
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node brain.js
