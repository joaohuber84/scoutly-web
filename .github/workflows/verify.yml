
name: Verify Picks

on:
  schedule:
    # Roda 3x por dia (horário UTC = Brasília + 3h)
    # 09h Brasília = 12h UTC → pega jogos da manhã
    - cron: '0 12 * * *'
    # 17h Brasília = 20h UTC → pega jogos da tarde
    - cron: '0 20 * * *'
    # 23h Brasília = 02h UTC → pega jogos da noite
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install @supabase/supabase-js
      - run: node scripts/verify.js
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
