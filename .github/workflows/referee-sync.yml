name: Referee Sync

on:
  schedule:
    # Roda 1x por dia às 06:00 UTC (03:00 Brasília)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  referee-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Sync referee stats
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/referee-sync.js
