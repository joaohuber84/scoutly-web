name: Scoutly Sync

on:
  schedule:
    - cron: '0 9 * * *'   # 06:00 BRT (09:00 UTC)
    - cron: '0 1 * * *'   # 22:00 BRT (01:00 UTC)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install

      - name: Sync
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/scoutly-sync.js

      - name: Brain
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/scoutly-brain.js

      - name: Árbitros — buscar nomes dos jogos de hoje
        run: |
          curl -s "https://zngdcatlxlxamceqpxij.supabase.co/functions/v1/populate-referees" || true

      - name: Árbitros — stats de todas as ligas
        run: |
          curl -s "https://zngdcatlxlxamceqpxij.supabase.co/functions/v1/run-referee-sync" || true
