name: Scoutly Sync

on:
  schedule:
    - cron: '0 9 * * *'   # 06:00 BRT
    - cron: '0 1 * * *'   # 22:00 BRT
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install
      - name: Sync
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/scoutly-sync.js
      - name: Preenche análises faltando
        run: |
          curl -s --max-time 30 "https://zngdcatlxlxamceqpxij.supabase.co/functions/v1/fill-missing-analysis" || true
      - name: Árbitros — busca nomes
        run: |
          curl -s --max-time 60 "https://zngdcatlxlxamceqpxij.supabase.co/functions/v1/populate-referees" || true

  brain:
    runs-on: ubuntu-latest
    needs: sync
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install
      - name: Brain
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/scoutly-brain.js
