name: Scoutly Sync

on:
  schedule:
    # 06:00 UTC = 03:00 Brasília — atualiza os dados da manhã
    - cron: '0 6 * * *'
    # 23:00 UTC = 20:00 Brasília — atualiza antes dos jogos da noite
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Run Scoutly Sync
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/scoutly-sync.js
      - name: Run Scoutly Brain
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/scoutly-brain.js
